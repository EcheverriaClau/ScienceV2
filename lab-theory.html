<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Théorie complète · STE Sec 3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d15;--bg2:#111520;--bg3:#181e2e;--bg4:#1e2638;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e4edf8;--muted:#5a7090;--light:#b8cde0;
  --accent:#c9a84c;--accent2:#7eb8e0;--accent3:#6dd4a0;
  --red:#e05555;--purple:#a07ed4;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Source Sans 3',sans-serif;
  --mono:'Source Code Pro',monospace;
  --sidebar:260px;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;line-height:1.7}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── LANG BAR ── */
#lang-bar{
  position:fixed;top:0;right:0;z-index:200;
  display:flex;gap:5px;padding:.65rem 1rem;
  background:rgba(10,13,21,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);border-left:1px solid var(--border);
  border-radius:0 0 0 8px;
}
.lb{font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:4px 10px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.lb.active{background:var(--accent);color:#0a0d15;border-color:var(--accent)}

/* ── LAYOUT ── */
#layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  position:sticky;top:0;height:100vh;
  overflow-y:auto;overflow-x:hidden;
  padding:1.5rem 0 4rem;
  z-index:100;
}
.sidebar-logo{
  padding:.5rem 1.25rem 1.25rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1rem;
}
.sidebar-logo h2{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--accent);line-height:1.2;margin-bottom:3px}
.sidebar-logo p{font-size:11px;color:var(--muted);font-family:var(--mono)}

.sidebar-section{margin-bottom:.5rem}
.sidebar-section-label{
  font-family:var(--mono);font-size:9px;color:var(--muted);
  letter-spacing:.18em;text-transform:uppercase;
  padding:.5rem 1.25rem .35rem;display:block;
}
.sidebar-link{
  display:flex;align-items:center;gap:8px;
  padding:.4rem 1.25rem;font-size:12.5px;
  color:var(--light);cursor:pointer;
  transition:background .15s,color .15s;
  border-left:2px solid transparent;
  text-decoration:none;
}
.sidebar-link:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sidebar-link.active{border-left-color:var(--accent);color:var(--accent);background:rgba(201,168,76,.06)}
.sidebar-link .sl-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.sidebar-link .sl-count{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--muted);background:var(--bg3);padding:1px 6px;border-radius:10px}

/* ── MAIN CONTENT ── */
#main{flex:1;overflow-x:hidden;padding:3rem 2.5rem 4rem;max-width:860px}
@media(max-width:700px){
  #sidebar{display:none}
  #main{padding:2rem 1.25rem 4rem}
}

/* ── HERO ── */
.main-hero{margin-bottom:3rem;padding-top:1rem}
.main-hero .tag{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;display:block;margin-bottom:.75rem}
.main-hero h1{font-family:var(--serif);font-size:clamp(2.2rem,5vw,3.2rem);font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:.6rem;color:var(--text)}
.main-hero h1 em{font-style:italic;color:var(--accent)}
.main-hero p{font-size:14px;color:var(--light);max-width:560px;line-height:1.7}
.hero-divider{height:1px;background:linear-gradient(90deg,var(--accent),transparent);margin:1.5rem 0}

/* ── CHAPTER ── */
.chapter{margin-bottom:3.5rem;scroll-margin-top:1.5rem}
.chapter-header{
  display:flex;align-items:flex-start;gap:16px;
  margin-bottom:1.75rem;padding-bottom:1.25rem;
  border-bottom:1px solid var(--border);
}
.chapter-icon{
  width:52px;height:52px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;border:1px solid var(--border2);
}
.chapter-meta{flex:1}
.chapter-num{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.15em;margin-bottom:4px}
.chapter-title{font-family:var(--serif);font-size:1.6rem;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px}
.chapter-sub{font-size:13px;color:var(--muted)}

/* ── TOPIC ── */
.topic{margin-bottom:2rem}
.topic-title{
  font-family:var(--serif);font-size:1.1rem;font-weight:700;
  color:var(--text);margin-bottom:.75rem;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
}
.topic-title::before{content:'▸';color:var(--accent);font-size:12px;flex-shrink:0;transition:transform .2s}
.topic-title.open::before{transform:rotate(90deg)}
.topic-body{display:none;padding-left:1.25rem;border-left:2px solid var(--border)}
.topic-body.open{display:block;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── TEXT ELEMENTS ── */
.prose{font-size:13.5px;color:var(--light);line-height:1.8;margin-bottom:1rem}
.prose strong{color:var(--text);font-weight:600}
.prose em{color:var(--accent2);font-style:italic}

/* definition */
.def-box{
  background:var(--bg3);border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;padding:.85rem 1.1rem;
  margin-bottom:1rem;
}
.def-term{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--accent);margin-bottom:.35rem}
.def-text{font-size:13px;color:var(--light);line-height:1.7}

/* formula */
.formula-display{
  background:var(--bg4);border:1px solid rgba(201,168,76,.2);
  border-radius:10px;padding:1rem 1.5rem;margin-bottom:1rem;
  text-align:center;
}
.formula-eq{font-family:var(--mono);font-size:1.3rem;font-weight:600;color:var(--accent);letter-spacing:.08em;margin-bottom:.35rem}
.formula-vars{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
.fv{background:var(--bg3);padding:2px 8px;border-radius:4px}

/* example */
.example-box{
  background:rgba(126,184,224,.06);border:1px solid rgba(126,184,224,.2);
  border-radius:8px;padding:.85rem 1.1rem;margin-bottom:.75rem;
}
.example-label{font-family:var(--mono);font-size:9px;color:var(--accent2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.4rem}
.example-text{font-size:13px;color:var(--light);line-height:1.65}
.example-answer{font-family:var(--mono);font-size:12px;color:var(--accent3);margin-top:.4rem}

/* tip */
.tip{border-radius:8px;padding:.75rem 1rem;margin-bottom:.75rem;font-size:12.5px;line-height:1.65;display:flex;gap:10px}
.tip-icon{flex-shrink:0;font-size:15px}
.tip-green{background:rgba(109,212,160,.07);border-left:3px solid var(--accent3);color:var(--light)}
.tip-yellow{background:rgba(201,168,76,.07);border-left:3px solid var(--accent);color:var(--light)}
.tip-red{background:rgba(224,85,85,.07);border-left:3px solid var(--red);color:var(--light)}
.tip-blue{background:rgba(126,184,224,.07);border-left:3px solid var(--accent2);color:var(--light)}
.tip-purple{background:rgba(160,126,212,.07);border-left:3px solid var(--purple);color:var(--light)}

/* key points */
.key-points{background:var(--bg3);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.kp-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.6rem}
.kp-item{font-size:13px;color:var(--light);padding:3px 0;display:flex;gap:8px;line-height:1.55}
.kp-item::before{content:'→';color:var(--accent);flex-shrink:0;font-family:var(--mono)}

/* comparison table */
.compare-table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:12.5px}
.compare-table th{background:var(--bg3);color:var(--accent);font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:.6rem .85rem;text-align:left;border-bottom:1px solid var(--border)}
.compare-table td{padding:.55rem .85rem;border-bottom:1px solid var(--border);color:var(--light);vertical-align:top}
.compare-table tr:hover td{background:rgba(255,255,255,.02)}

/* process steps */
.steps{counter-reset:step;margin-bottom:1rem}
.step{display:flex;gap:14px;margin-bottom:.75rem;align-items:flex-start}
.step-num{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:var(--accent);color:var(--bg);
  font-family:var(--mono);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin-top:2px;
}
.step-text{font-size:13px;color:var(--light);line-height:1.6;flex:1}
.step-text strong{color:var(--text)}

/* mnemonic */
.mnemonic{
  background:rgba(160,126,212,.08);border:1px solid rgba(160,126,212,.2);
  border-radius:8px;padding:.85rem 1.1rem;margin-bottom:.75rem;
  display:flex;gap:10px;align-items:flex-start;
}
.mnemonic-icon{font-size:18px;flex-shrink:0}
.mnemonic-text{font-size:13px;color:var(--light)}
.mnemonic-text strong{color:var(--purple);font-family:var(--mono);font-size:14px}

/* ── PROGRESS BAR ── */
.chapter-progress{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;
}
.cp-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border2);cursor:pointer;transition:background .2s;
}
.cp-dot.done{background:var(--accent3)}

/* ── EXAM FLAGS ── */
.exam-flag{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:9px;letter-spacing:.08em;
  padding:2px 8px;border-radius:3px;margin-left:8px;
  vertical-align:middle;
}
.ef-ste{background:rgba(201,168,76,.15);color:var(--accent);border:1px solid rgba(201,168,76,.3)}
.ef-exam{background:rgba(224,85,85,.15);color:var(--red);border:1px solid rgba(224,85,85,.3)}

/* ── BACK TO TOP ── */
.back-top{
  position:fixed;bottom:1.5rem;right:1.5rem;
  width:40px;height:40px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;color:var(--muted);
  transition:all .2s;z-index:50;
}
.back-top:hover{color:var(--text);border-color:var(--accent)}
</style>
</head>
<body>

<div id="lang-bar">
  <button class="lb active" onclick="setLang('fr')">FR</button>
  <button class="lb" onclick="setLang('en')">EN</button>
  <button class="lb" onclick="setLang('es')">ES</button>
</div>

<div id="layout">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <h2 id="sb-title">ScienceLab<br>Théorie complète</h2>
      <p id="sb-sub">STE Sec 3 · PFEQ Québec</p>
    </div>
    <div id="sidebar-nav"></div>
  </nav>

  <!-- MAIN -->
  <main id="main">

    <div class="main-hero">
      <span class="tag" id="hero-tag">STE Secondaire 3 · Québec · PFEQ</span>
      <h1 id="hero-h1">Théorie <em>complète</em></h1>
      <p id="hero-p">Tout le contenu du programme — définitions, formules, exemples réels, mnémotechniques et points clés pour l'examen.</p>
      <div class="hero-divider"></div>
    </div>

    <div id="chapters-container"></div>

  </main>
</div>

<button class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ═══════════════════════════════════════════════════════
//  CONTENT DATA
// ═══════════════════════════════════════════════════════
const CONTENT = {
  fr:{
    heroTag:'STE Secondaire 3 · Québec · PFEQ',
    heroH1:'Théorie <em>complète</em>',
    heroP:'Tout le contenu du programme — définitions, formules, exemples réels, mnémotechniques et points clés pour l\'examen.',
    sbTitle:'ScienceLab\nThéorie complète',sbSub:'STE Sec 3 · PFEQ Québec',
    chapters:[
      // ─────────────────────────────────────────────
      {
        id:'mat', icon:'⚗️', color:'#5bc8ff',
        num:'Univers 01',
        title:'Univers matériel',
        sub:'Organisation, propriétés et transformations de la matière',
        topics:[
          {
            title:'Propriétés physiques et chimiques',
            body:`
              <div class="def-box"><div class="def-term">Propriété physique</div><div class="def-text">Caractéristique observable ou mesurable <strong>sans modifier la nature</strong> de la substance. La substance reste la même après observation.</div></div>
              <div class="key-points"><div class="kp-title">Propriétés physiques clés</div>
                <div class="kp-item"><strong>Masse volumique</strong> (ρ) — masse par unité de volume</div>
                <div class="kp-item"><strong>Point de fusion / ébullition</strong> — températures de changement de phase</div>
                <div class="kp-item"><strong>Solubilité</strong> — capacité à se dissoudre dans un solvant</div>
                <div class="kp-item"><strong>Conductivité thermique & électrique</strong></div>
                <div class="kp-item"><strong>Dureté, malléabilité, ductilité</strong></div>
              </div>
              <div class="def-box"><div class="def-term">Propriété chimique</div><div class="def-text">Décrit la capacité d'une substance à <strong>se transformer en une autre substance</strong> lors d'une réaction chimique.</div></div>
              <div class="key-points"><div class="kp-title">Propriétés chimiques clés</div>
                <div class="kp-item"><strong>Inflamabilité</strong> — capacité à brûler</div>
                <div class="kp-item"><strong>Acidité / basicité</strong> — réaction avec indicateurs</div>
                <div class="kp-item"><strong>Réactivité avec les métaux</strong> — libère H₂</div>
                <div class="kp-item"><strong>Oxydation</strong> — réaction avec l'oxygène (ex: rouille)</div>
              </div>
              <div class="compare-table-wrap">
                <table class="compare-table">
                  <tr><th>Aspect</th><th>Propriété physique</th><th>Propriété chimique</th></tr>
                  <tr><td>Substance modifiée ?</td><td>Non</td><td>Oui — nouvelle substance</td></tr>
                  <tr><td>Réversible ?</td><td>Souvent oui</td><td>Souvent non</td></tr>
                  <tr><td>Exemple</td><td>Fondre de la glace</td><td>Brûler du bois</td></tr>
                </table>
              </div>
            `
          },
          {
            title:'Masse volumique',
            body:`
              <div class="formula-display">
                <div class="formula-eq">ρ = m ÷ V</div>
                <div class="formula-vars">
                  <span class="fv">ρ = masse volumique (g/mL ou g/cm³)</span>
                  <span class="fv">m = masse (g)</span>
                  <span class="fv">V = volume (mL ou cm³)</span>
                </div>
              </div>
              <div class="prose">La masse volumique mesure la <strong>quantité de matière par unité de volume</strong>. C'est une propriété intensive : elle ne dépend pas de la quantité de substance, seulement de sa nature.</div>
              <div class="tip tip-green"><span class="tip-icon">💧</span><span>L'eau pure = <strong>1 g/mL</strong> à 4°C → référence universelle. Si ρ objet < ρ liquide, l'objet flotte. Si ρ objet > ρ liquide, il coule.</span></div>
              <div class="example-box">
                <div class="example-label">Exemple réel</div>
                <div class="example-text">Un cube de plomb (ρ = 11,3 g/cm³) de 5 cm³. Quelle est sa masse ?</div>
                <div class="example-answer">m = ρ × V = 11,3 × 5 = 56,5 g ✓</div>
              </div>
              <div class="example-box">
                <div class="example-label">Exemple réel — flottaison</div>
                <div class="example-text">Pourquoi la glace (ρ = 0,92 g/mL) flotte-t-elle dans l'eau (ρ = 1 g/mL) ?</div>
                <div class="example-answer">Parce que 0,92 < 1 → la glace est moins dense que l'eau liquide. Les icebergs flottent à 90% immergés !</div>
              </div>
              <div class="tip tip-red"><span class="tip-icon">🚨</span><span>ERREUR FRÉQUENTE : confondre masse et masse volumique. La masse (g) dépend de la quantité, la masse volumique (g/mL) est une propriété de la substance.</span></div>
            `
          },
          {
            title:'Mélanges, solutions et substances pures',
            body:`
              <div class="compare-table-wrap">
                <table class="compare-table">
                  <tr><th>Type</th><th>Définition</th><th>Exemples</th></tr>
                  <tr><td><strong>Substance pure</strong></td><td>Un seul type de particule</td><td>Eau (H₂O), sel (NaCl), fer (Fe)</td></tr>
                  <tr><td><strong>Mélange homogène</strong></td><td>Composition uniforme, composants non visibles</td><td>Eau salée, air, sirop, laiton</td></tr>
                  <tr><td><strong>Mélange hétérogène</strong></td><td>Composants visibles, non uniformes</td><td>Vinaigrette, granola, sable+eau</td></tr>
                </table>
              </div>
              <div class="def-box"><div class="def-term">Solution</div><div class="def-text">Mélange homogène d'un <strong>soluté</strong> (dissous) dans un <strong>solvant</strong> (dissolvant). Ex: sel (soluté) dans l'eau (solvant).</div></div>
              <div class="key-points"><div class="kp-title">Méthodes de séparation</div>
                <div class="kp-item"><strong>Filtration</strong> — sépare solide/liquide (ex: café)</div>
                <div class="kp-item"><strong>Distillation</strong> — sépare liquides par ébullition (ex: eau/alcool)</div>
                <div class="kp-item"><strong>Évaporation</strong> — élimine le solvant (ex: sel marin)</div>
                <div class="kp-item"><strong>Décantation</strong> — séparation par densité</div>
              </div>
            `
          },
          {
            title:'Concentration et dilution',
            body:`
              <div class="formula-display">
                <div class="formula-eq">C = m ÷ V</div>
                <div class="formula-vars">
                  <span class="fv">C = concentration (g/L)</span>
                  <span class="fv">m = masse de soluté (g)</span>
                  <span class="fv">V = volume de solution (L)</span>
                </div>
              </div>
              <div class="formula-display">
                <div class="formula-eq">C₁ × V₁ = C₂ × V₂</div>
                <div class="formula-vars"><span class="fv">Dilution : la quantité de soluté est conservée</span></div>
              </div>
              <div class="tip tip-yellow"><span class="tip-icon">⚠️</span><span>V doit être en <strong>litres</strong> ! 500 mL = 0,5 L. Lors d'une dilution, on ajoute du <strong>solvant</strong> (eau), jamais de soluté.</span></div>
              <div class="example-box">
                <div class="example-label">Exemple — concentration</div>
                <div class="example-text">On dissout 30 g de sucre dans 0,5 L d'eau. C = ?</div>
                <div class="example-answer">C = 30 ÷ 0,5 = 60 g/L</div>
              </div>
              <div class="example-box">
                <div class="example-label">Exemple — dilution</div>
                <div class="example-text">On prend 100 mL (0,1 L) d'une solution à 80 g/L et on complète à 400 mL (0,4 L). C₂ = ?</div>
                <div class="example-answer">C₂ = (80 × 0,1) ÷ 0,4 = 8 ÷ 0,4 = 20 g/L</div>
              </div>
            `
          },
          {
            title:'pH, acides et bases',
            body:`
              <div class="def-box"><div class="def-term">Échelle de pH</div><div class="def-text">Mesure l'acidité d'une solution de 0 à 14. pH < 7 = acide, pH 7 = neutre, pH > 7 = base. Chaque unité = ×10 en concentration d'ions H⁺.</div></div>
              <div class="compare-table-wrap">
                <table class="compare-table">
                  <tr><th>Catégorie</th><th>pH</th><th>Ions dominants</th><th>Exemples</th></tr>
                  <tr><td>Acide fort</td><td>0–3</td><td>H⁺ élevé</td><td>HCl, H₂SO₄, jus de citron (pH 2)</td></tr>
                  <tr><td>Acide faible</td><td>4–6</td><td>H⁺ modéré</td><td>Café (pH 5), pluie (pH 5,6)</td></tr>
                  <tr><td>Neutre</td><td>7</td><td>H⁺ = OH⁻</td><td>Eau pure, NaCl(aq)</td></tr>
                  <tr><td>Base faible</td><td>8–10</td><td>OH⁻ modéré</td><td>Bicarbonate (pH 9), eau de mer (pH 8)</td></tr>
                  <tr><td>Base forte</td><td>11–14</td><td>OH⁻ élevé</td><td>NaOH, eau de Javel (pH 12)</td></tr>
                </table>
              </div>
              <div class="def-box"><div class="def-term">Neutralisation</div><div class="def-text">Acide + Base → Sel + Eau. Réaction exothermique. Ex: HCl + NaOH → NaCl + H₂O</div></div>
              <div class="tip tip-blue"><span class="tip-icon">🧪</span><span>L'<strong>indicateur universel</strong> change de couleur selon le pH. Le papier tournesol vire au <strong>rouge</strong> en acide et au <strong>bleu</strong> en base.</span></div>
            `

  fr:{tag:'STE Secondaire 3 · Québec · PFEQ',h1:'Théorie <em>complète</em>',p:'Tout le contenu du programme — définitions, formules, exemples réels, mnémotechniques et points clés pour l\'examen.',sbTitle:'ScienceLab\nThéorie complète',sbSub:'STE Sec 3 · PFEQ Québec',btnAll:'Tout développer',btnCollapse:'Tout réduire'},
  en:{tag:'STE Grade 9 · Québec · PFEQ',h1:'Complete <em>theory</em>',p:'All programme content — definitions, formulas, real-world examples, mnemonics and key exam points.',sbTitle:'ScienceLab\nFull Theory',sbSub:'STE Sec 3 · PFEQ Québec',btnAll:'Expand all',btnCollapse:'Collapse all'},
  es:{tag:'STE Secundaria 3 · Québec · PFEQ',h1:'Teoría <em>completa</em>',p:'Todo el contenido del programa — definiciones, fórmulas, ejemplos reales, reglas mnemónicas y puntos clave para el examen.',sbTitle:'ScienceLab\nTeoría completa',sbSub:'STE Sec 3 · PFEQ Québec',btnAll:'Expandir todo',btnCollapse:'Contraer todo'},
};

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let lang = 'fr';

// ═══════════════════════════════════════════════════════
//  LANG
// ═══════════════════════════════════════════════════════
function setLang(l){
  lang = l;
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  const m = LANG_META[l];
  document.getElementById('hero-tag').textContent = m.tag;
  document.getElementById('hero-h1').innerHTML = m.h1;
  document.getElementById('hero-p').textContent = m.p;
  const sbTitle = document.getElementById('sb-title');
  if(sbTitle) sbTitle.innerHTML = m.sbTitle.replace('\n','<br>');
  const sbSub = document.getElementById('sb-sub');
  if(sbSub) sbSub.textContent = m.sbSub;
  // Content is in FR only but structure works — note to extend later
  renderSidebar();
}

// ═══════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════
function renderSidebar(){
  const data = CONTENT.fr;
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = data.chapters.map(ch => `
    <div class="sidebar-section">
      <span class="sidebar-section-label">${ch.num}</span>
      <a class="sidebar-link" href="#ch-${ch.id}" onclick="scrollTo('${ch.id}')">
        <span class="sl-icon">${ch.icon}</span>
        ${ch.title}
        <span class="sl-count">${ch.topics.length}</span>
      </a>
      ${ch.topics.map((t,i) => `
        <a class="sidebar-link" href="#tp-${ch.id}-${i}" onclick="openTopic('${ch.id}',${i})" style="padding-left:2rem;font-size:11.5px;color:var(--muted)">
          <span class="sl-icon" style="font-size:11px">·</span>
          ${t.title.replace(' ⭐ STE+','').substring(0,32)}${t.title.length > 32 ? '…':''}
        </a>
      `).join('')}
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════
//  RENDER CHAPTERS
// ═══════════════════════════════════════════════════════
function renderChapters(){
  const data = CONTENT.fr;
  const container = document.getElementById('chapters-container');
  container.innerHTML = data.chapters.map((ch, ci) => `
    <div class="chapter" id="ch-${ch.id}">
      <div class="chapter-header">
        <div class="chapter-icon" style="background:${ch.color}18;border-color:${ch.color}30">${ch.icon}</div>
        <div class="chapter-meta">
          <div class="chapter-num">${ch.num}</div>
          <div class="chapter-title" style="color:${ch.color}">${ch.title}</div>
          <div class="chapter-sub">${ch.sub}</div>
        </div>
      </div>
      <div class="chapter-progress">
        ${ch.topics.map((_,i) => `<div class="cp-dot" id="dot-${ch.id}-${i}" onclick="openTopic('${ch.id}',${i})" title="${ch.topics[i].title}"></div>`).join('')}
      </div>
      ${ch.topics.map((topic, ti) => `
        <div class="topic" id="tp-${ch.id}-${ti}">
          <div class="topic-title" id="ttitle-${ch.id}-${ti}" onclick="toggleTopic('${ch.id}',${ti})">
            ${topic.title}
            ${topic.title.includes('STE+') ? '<span class="exam-flag ef-ste">STE+</span>' : ''}
            ${ti === 0 ? '<span class="exam-flag ef-exam">EXAMEN</span>' : ''}
          </div>
          <div class="topic-body" id="tbody-${ch.id}-${ti}">
            ${topic.body}
          </div>
        </div>
      `).join('')}
    </div>
    ${ci < data.chapters.length - 1 ? '<div style="height:1px;background:var(--border);margin-bottom:3rem"></div>' : ''}
  `).join('');
}

// ═══════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════
function toggleTopic(chId, ti){
  const title = document.getElementById(`ttitle-${chId}-${ti}`);
  const body = document.getElementById(`tbody-${chId}-${ti}`);
  const dot = document.getElementById(`dot-${chId}-${ti}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  title.classList.toggle('open', !isOpen);
  if(dot) dot.classList.toggle('done', !isOpen);
}

function openTopic(chId, ti){
  const body = document.getElementById(`tbody-${chId}-${ti}`);
  const title = document.getElementById(`ttitle-${chId}-${ti}`);
  const dot = document.getElementById(`dot-${chId}-${ti}`);
  body.classList.add('open');
  title.classList.add('open');
  if(dot) dot.classList.add('done');
  document.getElementById(`tp-${chId}-${ti}`).scrollIntoView({behavior:'smooth', block:'start'});
}

// Sidebar scroll highlight
window.addEventListener('scroll', ()=>{
  const chapters = CONTENT.fr.chapters;
  chapters.forEach(ch => {
    const el = document.getElementById(`ch-${ch.id}`);
    if(!el) return;
    const rect = el.getBoundingClientRect();
    const links = document.querySelectorAll(`.sidebar-link[href="#ch-${ch.id}"]`);
    links.forEach(l => l.classList.toggle('active', rect.top < 200 && rect.bottom > 0));
  });
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
renderChapters();
renderSidebar();

// Auto-open first topic of each chapter
setTimeout(()=>{
  CONTENT.fr.chapters.forEach(ch => openTopic(ch.id, 0));
}, 300);
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Biologie — Systèmes du corps · STE Sec 3</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070910;--bg2:#0d1220;--bg3:#131a2c;--bg4:#181f30;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#ddeeff;--muted:#4a6282;
  --heart:#ff4466;--eye:#44aaff;--brain:#aa66ff;--digestif:#ff8c42;
  --circulo:#ff4466;--resp:#44ccff;--nerveux:#aa66ff;--immun:#4ddc8a;--excret:#ffd166;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(1px 1px at 75% 15%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 50% 80%,rgba(255,255,255,.2) 0%,transparent 100%);pointer-events:none;z-index:0}

#lang-bar{position:relative;z-index:10;display:flex;gap:6px;justify-content:flex-end;padding:1rem 1.25rem 0}
.lb{font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:5px 12px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.lb.active{background:var(--heart);color:#fff;border-color:var(--heart)}

#app{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:1.25rem 1.25rem 4rem}

.hero{text-align:center;padding:1.25rem 0 1.75rem}
.hero-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.6rem}
.hero h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;letter-spacing:-.03em;margin-bottom:.3rem}
.hero h1 em{font-style:normal;color:var(--heart)}
.hero p{font-size:13px;color:var(--muted)}

.sec{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:.85rem;margin-top:1.5rem}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── SYSTEM TABS ── */
.sys-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.sys-tab{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-family:var(--font);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.sys-tab:hover{color:var(--text);border-color:var(--border2)}
.sys-tab.active{color:#fff;font-weight:700;border-width:1.5px}

/* ── SYSTEM PANELS ── */
.sys-panel{display:none}
.sys-panel.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── DIAGRAM LAYOUT ── */
.diagram-layout{display:grid;grid-template-columns:1fr 280px;gap:1.25rem;margin-bottom:1.5rem;align-items:start}
@media(max-width:580px){.diagram-layout{grid-template-columns:1fr}}
.diagram-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;position:relative}
.diagram-wrap svg{width:100%;display:block;cursor:pointer}

/* ── INFO PANEL ── */
.info-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;min-height:180px;display:flex;flex-direction:column;gap:.75rem}
.info-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;color:var(--muted);font-size:13px;gap:.5rem;padding:1rem}
.info-empty .arr{font-size:24px;animation:bounce 1.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.info-name{font-size:17px;font-weight:700;margin-bottom:3px}
.info-badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);display:inline-block;margin-bottom:.5rem}
.info-fn{font-size:13px;line-height:1.7;color:rgba(221,238,255,.85)}
.info-fact{background:var(--bg3);border-left:3px solid var(--heart);border-radius:0 8px 8px 0;padding:.6rem .85rem;font-size:12px;color:rgba(221,238,255,.7);line-height:1.6;margin-top:.25rem}
.info-fact strong{color:var(--heart)}

/* ── PART LABELS ── */
.part-label{font-size:11px;fill:rgba(221,238,255,.8);font-family:'JetBrains Mono',monospace;cursor:pointer;transition:fill .15s}
.part-label:hover{fill:#fff}
.part-hotspot{cursor:pointer;transition:opacity .15s}
.part-hotspot:hover{opacity:.8}

/* ── THEORY BOX ── */
.theory-box{background:var(--bg2);border:1px solid var(--border);border-left:3px solid;border-radius:0 var(--r) var(--r) 0;padding:1rem 1.25rem;font-size:13px;line-height:1.8;color:rgba(221,238,255,.8);margin-bottom:1.25rem}
.theory-box h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:.5rem}

/* steps */
.steps{margin-bottom:1rem}
.step{display:flex;gap:12px;margin-bottom:.65rem;align-items:flex-start}
.step-n{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;margin-top:1px}
.step-t{font-size:13px;color:rgba(221,238,255,.85);line-height:1.6;flex:1}
.step-t strong{color:var(--text)}

/* table */
.bio-table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:12.5px}
.bio-table th{background:var(--bg3);color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:.55rem .85rem;text-align:left;border-bottom:1px solid var(--border)}
.bio-table td{padding:.5rem .85rem;border-bottom:1px solid var(--border);color:rgba(221,238,255,.85);vertical-align:top}
.bio-table tr:hover td{background:rgba(255,255,255,.02)}

/* tip boxes */
.tip{border-radius:8px;padding:.7rem 1rem;margin-bottom:.65rem;font-size:12.5px;line-height:1.65;display:flex;gap:10px}
.tip-icon{flex-shrink:0;font-size:15px}
.tip-green{background:rgba(77,220,138,.07);border-left:3px solid var(--immun);color:rgba(221,238,255,.85)}
.tip-red{background:rgba(255,68,102,.07);border-left:3px solid var(--heart);color:rgba(221,238,255,.85)}
.tip-blue{background:rgba(68,170,255,.07);border-left:3px solid var(--eye);color:rgba(221,238,255,.85)}
.tip-purple{background:rgba(170,102,255,.07);border-left:3px solid var(--brain);color:rgba(221,238,255,.85)}

/* quiz */
.q-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}
.q-num{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:.4rem}
.q-text{font-size:14px;line-height:1.6;margin-bottom:.75rem}
.q-opts{display:grid;gap:6px}
.q-opt{display:block;width:100%;text-align:left;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;transition:all .15s}
.q-opt:hover:not(:disabled){border-color:var(--border2);transform:translateX(3px)}
.q-opt:disabled{cursor:default}
.q-opt.correct{background:rgba(77,220,138,.12);border-color:var(--immun);color:#a7f3ca}
.q-opt.wrong{background:rgba(255,68,102,.1);border-color:var(--heart);color:#fca5a5}
.q-opt.reveal{background:rgba(77,220,138,.08);border-color:rgba(77,220,138,.4);color:#a7f3ca}
.q-fb{display:none;margin-top:.6rem;padding:.65rem .85rem;border-radius:7px;font-size:12.5px;line-height:1.65}
.q-fb.show{display:block;animation:fadeUp .2s ease}
.q-fb.ok{background:rgba(77,220,138,.08);color:#a7f3ca;border-left:3px solid var(--immun)}
.q-fb.bad{background:rgba(255,68,102,.08);color:#fca5a5;border-left:3px solid var(--heart)}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;text-align:center;display:none;margin-top:1rem}
.result-card.show{display:block;animation:fadeUp .4s ease}
.result-pct{font-size:3rem;font-weight:900;letter-spacing:-.04em;margin-bottom:.3rem}
.result-msg{font-size:13px;color:var(--muted);margin-bottom:1rem}
.btn-retry{font-family:var(--font);font-weight:700;font-size:14px;padding:11px 24px;border:none;border-radius:8px;background:var(--heart);color:#fff;cursor:pointer;transition:all .2s}
.btn-retry:hover{transform:translateY(-2px)}

/* legend */
.legend-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:4px 10px;border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s;background:var(--bg2)}
.leg-item:hover{border-color:var(--border2);color:var(--text)}
.leg-item.active{border-color:currentColor}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="lang-bar">
  <button class="lb active" onclick="setLang('fr')">FR</button>
  <button class="lb" onclick="setLang('en')">EN</button>
  <button class="lb" onclick="setLang('es')">ES</button>
</div>
<div id="app">
  <div class="hero">
    <span class="hero-tag" id="hero-tag">STE Secondaire 3 · Univers vivant</span>
    <h1 id="hero-h1">Biologie <em>interactive</em></h1>
    <p id="hero-p">Clique sur chaque partie pour découvrir sa fonction</p>
  </div>

  <p class="sec" id="sec-sys">Choisir un système</p>
  <div class="sys-tabs" id="sys-tabs"></div>

  <!-- PANELS injected by JS -->
  <div id="panels-container"></div>

  <p class="sec" id="sec-quiz">Quiz biologie</p>
  <div id="quiz-body"></div>
  <div class="result-card" id="result-card">
    <div class="result-pct" id="result-pct"></div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn-retry" onclick="initQuiz()" id="btn-retry"></button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════
const SYSTEMS = {
  heart:{
    color:'#ff4466',
    fr:{name:'Cœur',icon:'❤️'},en:{name:'Heart',icon:'❤️'},es:{name:'Corazón',icon:'❤️'},
    parts:{
      ao:{fr:{name:'Aorte',badge:'Artère principale',fn:'Transporte le sang oxygéné vers tout le corps. C\'est la plus grande artère (diamètre ~2,5 cm).',fact:'<strong>Fait :</strong> L\'aorte est si large qu\'un crayon pourrait y entrer ! Elle reçoit 5 litres de sang par minute.'},en:{name:'Aorta',badge:'Main artery',fn:'Carries oxygenated blood to the whole body. It is the largest artery (diameter ~2.5 cm).',fact:'<strong>Fact:</strong> The aorta is so wide a pencil could fit inside! It receives 5 litres of blood per minute.'},es:{name:'Aorta',badge:'Arteria principal',fn:'Transporta la sangre oxigenada a todo el cuerpo. Es la arteria más grande (diámetro ~2,5 cm).',fact:'<strong>Dato:</strong> ¡La aorta es tan ancha que un lápiz cabría dentro! Recibe 5 litros de sangre por minuto.'}},
      vd:{fr:{name:'Ventricule droit',badge:'Chambre inférieure droite',fn:'Pompe le sang désoxygéné vers les poumons via l\'artère pulmonaire pour qu\'il soit réoxygéné.',fact:'<strong>Fait :</strong> Le ventricule droit produit ~1/4 de la pression du ventricule gauche — les poumons sont fragiles!'},en:{name:'Right ventricle',badge:'Lower right chamber',fn:'Pumps deoxygenated blood to the lungs via the pulmonary artery to be re-oxygenated.',fact:'<strong>Fact:</strong> The right ventricle produces ~1/4 the pressure of the left ventricle — the lungs are delicate!'},es:{name:'Ventrículo derecho',badge:'Cámara inferior derecha',fn:'Bombea la sangre desoxigenada hacia los pulmones para que sea reoxigenada.',fact:'<strong>Dato:</strong> El ventrículo derecho produce ~1/4 de la presión del izquierdo — ¡los pulmones son delicados!'}},
      vg:{fr:{name:'Ventricule gauche',badge:'Chambre inférieure gauche',fn:'La pompe principale ! Propulse le sang oxygéné vers tout le corps. Paroi très épaisse (~1,2 cm).',fact:'<strong>Fait :</strong> Le ventricule gauche génère assez de force pour projeter le sang à 2 mètres de hauteur !'},en:{name:'Left ventricle',badge:'Lower left chamber',fn:'The main pump! Propels oxygenated blood to the whole body. Very thick wall (~1.2 cm).',fact:'<strong>Fact:</strong> The left ventricle generates enough force to shoot blood 2 metres high!'},es:{name:'Ventrículo izquierdo',badge:'Cámara inferior izquierda',fn:'¡La bomba principal! Impulsa la sangre oxigenada a todo el cuerpo. Pared muy gruesa (~1,2 cm).',fact:'<strong>Dato:</strong> ¡El ventrículo izquierdo genera suficiente fuerza para lanzar sangre a 2 metros de altura!'}},
      od:{fr:{name:'Oreillette droite',badge:'Chambre supérieure droite',fn:'Reçoit le sang désoxygéné du corps entier via les veines caves (supérieure et inférieure).',fact:'<strong>Fait :</strong> L\'oreillette droite reçoit environ 70% du retour veineux du corps.'},en:{name:'Right atrium',badge:'Upper right chamber',fn:'Receives deoxygenated blood from the whole body via the superior and inferior vena cava.',fact:'<strong>Fact:</strong> The right atrium receives about 70% of the venous return from the body.'},es:{name:'Aurícula derecha',badge:'Cámara superior derecha',fn:'Recibe la sangre desoxigenada de todo el cuerpo a través de las venas cavas.',fact:'<strong>Dato:</strong> La aurícula derecha recibe aproximadamente el 70% del retorno venoso del cuerpo.'}},
      og:{fr:{name:'Oreillette gauche',badge:'Chambre supérieure gauche',fn:'Reçoit le sang oxygéné revenant des poumons via les veines pulmonaires (4 veines).',fact:'<strong>Fait :</strong> L\'oreillette gauche est la chambre la plus postérieure du cœur — proche de l\'œsophage.'},en:{name:'Left atrium',badge:'Upper left chamber',fn:'Receives oxygenated blood returning from the lungs via the pulmonary veins (4 veins).',fact:'<strong>Fact:</strong> The left atrium is the most posterior chamber of the heart — close to the oesophagus.'},es:{name:'Aurícula izquierda',badge:'Cámara superior izquierda',fn:'Recibe la sangre oxigenada que regresa de los pulmones a través de las venas pulmonares.',fact:'<strong>Dato:</strong> La aurícula izquierda es la cámara más posterior del corazón — cerca del esófago.'}},
      ap:{fr:{name:'Artère pulmonaire',badge:'Vers les poumons',fn:'Unique artère transportant du sang désoxygéné. Porte le sang du ventricule droit aux poumons.',fact:'<strong>Fait :</strong> C\'est la seule artère du corps qui transporte du sang désoxygéné (toutes les autres transportent du sang oxygéné).'},en:{name:'Pulmonary artery',badge:'To the lungs',fn:'The only artery carrying deoxygenated blood. Takes blood from the right ventricle to the lungs.',fact:'<strong>Fact:</strong> It is the only artery in the body that carries deoxygenated blood (all others carry oxygenated blood).'},es:{name:'Arteria pulmonar',badge:'Hacia los pulmones',fn:'Única arteria que transporta sangre desoxigenada. Lleva sangre del ventrículo derecho a los pulmones.',fact:'<strong>Dato:</strong> Es la única arteria del cuerpo que transporta sangre desoxigenada (todas las demás transportan sangre oxigenada).'}},
      vc:{fr:{name:'Veine cave',badge:'Retour veineux',fn:'Deux veines (supérieure et inférieure) ramènent le sang désoxygéné de tout le corps vers l\'oreillette droite.',fact:'<strong>Fait :</strong> La veine cave inférieure est la plus grande veine du corps humain (~2 cm de diamètre).'},en:{name:'Vena cava',badge:'Venous return',fn:'Two veins (superior and inferior) return deoxygenated blood from the whole body to the right atrium.',fact:'<strong>Fact:</strong> The inferior vena cava is the largest vein in the human body (~2 cm diameter).'},es:{name:'Vena cava',badge:'Retorno venoso',fn:'Dos venas (superior e inferior) devuelven la sangre desoxigenada de todo el cuerpo a la aurícula derecha.',fact:'<strong>Dato:</strong> La vena cava inferior es la vena más grande del cuerpo humano (~2 cm de diámetro).'}},
      sep:{fr:{name:'Septum',badge:'Cloison cardiaque',fn:'Paroi musculaire qui sépare le cœur droit (sang désoxygéné) du cœur gauche (sang oxygéné). Empêche les mélanges.',fact:'<strong>Fait :</strong> Un défaut septal (trou dans le septum) est l\'une des malformations cardiaques congénitales les plus fréquentes.'},en:{name:'Septum',badge:'Cardiac partition',fn:'Muscular wall separating the right heart (deoxygenated blood) from the left heart (oxygenated blood). Prevents mixing.',fact:'<strong>Fact:</strong> A septal defect (hole in the septum) is one of the most common congenital heart defects.'},es:{name:'Tabique',badge:'Pared cardíaca',fn:'Pared muscular que separa el corazón derecho (sangre desoxigenada) del izquierdo (sangre oxigenada). Evita mezclas.',fact:'<strong>Dato:</strong> Un defecto septal (agujero en el tabique) es una de las malformaciones cardíacas congénitas más frecuentes.'}},
    }
  },
  eye:{
    color:'#44aaff',
    fr:{name:'Œil',icon:'👁️'},en:{name:'Eye',icon:'👁️'},es:{name:'Ojo',icon:'👁️'},
    parts:{
      cornee:{fr:{name:'Cornée',badge:'Lentille transparente',fn:'Surface transparente courbée qui réfracte (dévie) la lumière vers le cristallin. Représente 2/3 du pouvoir réfractif de l\'œil.',fact:'<strong>Fait :</strong> La cornée n\'a pas de vaisseaux sanguins — elle se nourrit directement de l\'oxygène de l\'air et des larmes.'},en:{name:'Cornea',badge:'Transparent lens',fn:'Curved transparent surface that refracts (bends) light towards the lens. Accounts for 2/3 of the eye\'s refractive power.',fact:'<strong>Fact:</strong> The cornea has no blood vessels — it gets oxygen directly from air and tears.'},es:{name:'Córnea',badge:'Lente transparente',fn:'Superficie transparente curva que refracta (desvía) la luz hacia el cristalino. Representa 2/3 del poder refractivo del ojo.',fact:'<strong>Dato:</strong> La córnea no tiene vasos sanguíneos — se nutre directamente del oxígeno del aire y las lágrimas.'}},
      iris:{fr:{name:'Iris',badge:'Diaphragme coloré',fn:'Muscle annulaire coloré qui contrôle le diamètre de la pupille. Se contracte en lumière forte (pupille petite) et se dilate dans l\'obscurité (pupille grande).',fact:'<strong>Fait :</strong> La couleur de l\'iris est déterminée par la quantité de mélanine. Brun = beaucoup, bleu = peu. Les yeux bleus sont une mutation génétique vieille de ~10 000 ans.'},en:{name:'Iris',badge:'Coloured diaphragm',fn:'Coloured ring muscle controlling pupil diameter. Contracts in bright light (small pupil) and dilates in darkness (large pupil).',fact:'<strong>Fact:</strong> Iris colour is determined by melanin amount. Brown = lots, blue = little. Blue eyes are a genetic mutation ~10,000 years old.'},es:{name:'Iris',badge:'Diafragma coloreado',fn:'Músculo anular coloreado que controla el diámetro de la pupila. Se contrae con luz intensa (pupila pequeña) y se dilata en la oscuridad.',fact:'<strong>Dato:</strong> El color del iris está determinado por la cantidad de melanina. Marrón = mucha, azul = poca. Los ojos azules son una mutación genética de ~10 000 años.'}},
      cristallin:{fr:{name:'Cristallin',badge:'Lentille flexible',fn:'Lentille biconvexe transparente et flexible. Son épaisseur est ajustée par les muscles ciliaires pour faire la mise au point (accommodation).',fact:'<strong>Fait :</strong> Le cristallin peut changer de forme en 330 millisecondes ! Avec l\'âge, il perd sa flexibilité → presbytie (difficulté à voir de près).'},en:{name:'Lens',badge:'Flexible lens',fn:'Transparent biconvex flexible lens. Its thickness is adjusted by ciliary muscles to focus (accommodation).',fact:'<strong>Fact:</strong> The lens can change shape in 330 milliseconds! With age it loses flexibility → presbyopia (difficulty seeing close up).'},es:{name:'Cristalino',badge:'Lente flexible',fn:'Lente biconvexa transparente y flexible. Su grosor es ajustado por los músculos ciliares para enfocar (acomodación).',fact:'<strong>Dato:</strong> ¡El cristalino puede cambiar de forma en 330 milisegundos! Con la edad pierde flexibilidad → presbicia.'}},
      retine:{fr:{name:'Rétine',badge:'Écran récepteur',fn:'Couche de cellules photoréceptrices tapissant le fond de l\'œil. Cônes (vision couleurs, jour) et bâtonnets (vision nuit, noir et blanc) convertissent la lumière en signaux nerveux.',fact:'<strong>Fait :</strong> La rétine contient ~120 millions de bâtonnets et ~6 millions de cônes. L\'image est projetée à l\'envers sur la rétine — le cerveau la retourne !'},en:{name:'Retina',badge:'Receptor screen',fn:'Layer of photoreceptor cells lining the back of the eye. Cones (colour/day vision) and rods (night/black-and-white vision) convert light into nerve signals.',fact:'<strong>Fact:</strong> The retina contains ~120 million rods and ~6 million cones. The image is projected upside down on the retina — the brain flips it!'},es:{name:'Retina',badge:'Pantalla receptora',fn:'Capa de células fotorreceptoras que tapiza el fondo del ojo. Los conos (visión en color, día) y los bastones (visión nocturna) convierten la luz en señales nerviosas.',fact:'<strong>Dato:</strong> La retina contiene ~120 millones de bastones y ~6 millones de conos. ¡La imagen se proyecta invertida en la retina — el cerebro la voltea!'}},
      nerf:{fr:{name:'Nerf optique',badge:'Cable vers le cerveau',fn:'Transmet les signaux électriques de la rétine vers le cortex visuel du cerveau. Composé de ~1 million de fibres nerveuses.',fact:'<strong>Fait :</strong> Le point où le nerf optique quitte la rétine est le "point aveugle" — il n\'y a aucun photorécepteur là. Tu ne le perçois pas car le cerveau le "remplit" !'},en:{name:'Optic nerve',badge:'Cable to the brain',fn:'Transmits electrical signals from the retina to the brain\'s visual cortex. Composed of ~1 million nerve fibres.',fact:'<strong>Fact:</strong> Where the optic nerve leaves the retina is the "blind spot" — no photoreceptors there. You don\'t notice it because the brain "fills it in"!'},es:{name:'Nervio óptico',badge:'Cable al cerebro',fn:'Transmite señales eléctricas de la retina al córtex visual del cerebro. Compuesto por ~1 millón de fibras nerviosas.',fact:'<strong>Dato:</strong> El punto donde el nervio óptico sale de la retina es el "punto ciego" — no hay fotorreceptores allí. ¡No lo percibes porque el cerebro lo "rellena"!'}},

let lang='fr', activeSystem='heart', selectedPart=null, quizAnswers=[];

function t(k){return TX[lang][k]}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

// ═══════════════════════════════════════════════════════
//  LANG
// ═══════════════════════════════════════════════════════
function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  applyTexts();
  renderTabs();
  renderPanel(activeSystem);
  initQuiz();
}

function applyTexts(){
  const tx=TX[lang];
  document.getElementById('hero-tag').textContent=tx.heroTag;
  document.getElementById('hero-h1').innerHTML=tx.heroH1;
  document.getElementById('hero-p').textContent=tx.heroP;
  document.getElementById('sec-sys').childNodes[0].textContent=tx.secSys;
  document.getElementById('sec-quiz').childNodes[0].textContent=tx.secQuiz;
}

// ═══════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════
function renderTabs(){
  const tx=TX[lang];
  const container=document.getElementById('sys-tabs');
  container.innerHTML=['heart','eye','brain','systemes'].map(id=>{
    const s=SYSTEMS[id];
    const active=id===activeSystem;
    return `<button class="sys-tab${active?' active':''}"
      style="${active?`border-color:${s.color};color:${s.color};background:${s.color}15`:''}"
      onclick="switchSystem('${id}')">
      ${s[lang].icon} ${tx.sysLabel[id]}
    </button>`;
  }).join('');
}

function switchSystem(id){
  activeSystem=id;selectedPart=null;
  renderTabs();renderPanel(id);
}

// ═══════════════════════════════════════════════════════
//  PANELS
// ═══════════════════════════════════════════════════════
function renderPanel(id){
  const container=document.getElementById('panels-container');
  container.innerHTML='';
  const panel=document.createElement('div');
  panel.className='sys-panel active';

  if(id==='systemes'){
    panel.innerHTML=buildSystemesPanel();
  } else {
    panel.innerHTML=buildDiagramPanel(id);
  }
  container.appendChild(panel);
}

function buildDiagramPanel(id){
  const s=SYSTEMS[id];
  const tx=TX[lang];
  const svgFn={heart:heartSVG,eye:eyeSVG,brain:brainSVG}[id];
  const legend=Object.entries(s.parts).map(([key,p])=>`
    <div class="leg-item${selectedPart===key?' active':''}" data-part="${key}"
      style="${selectedPart===key?`color:${s.color};border-color:${s.color}`:''};"
      onclick="selectPart('${id}','${key}')">
      <span class="leg-dot" style="background:${s.color}"></span>
      ${p[lang].name}
    </div>`).join('');

  const infoHTML=selectedPart&&s.parts[selectedPart]?buildInfoCard(s,selectedPart):`
    <div class="info-empty">
      <span class="arr">👆</span>
      <span>${tx.clickHint}</span>
    </div>`;

  return `
    <div class="diagram-layout">
      <div class="diagram-wrap">
        ${svgFn(id,s)}
      </div>
      <div class="info-panel" id="info-panel-${id}">${infoHTML}</div>
    </div>
    <div class="legend-grid">${legend}</div>
    ${buildTheorySection(id)}
  `;
}

function buildInfoCard(sys,partKey){
  const p=sys.parts[partKey][lang];
  const c=sys.color;
  return `
    <div style="font-size:22px;margin-bottom:4px">🔍</div>
    <div class="info-name" style="color:${c}">${p.name}</div>
    <span class="info-badge" style="border-color:${c}44;color:${c}">${p.badge}</span>
    <div class="info-fn">${p.fn}</div>
    <div class="info-fact" style="border-color:${c}">${p.fact}</div>
  `;
}

function selectPart(sysId,partKey){
  selectedPart=partKey;
  renderPanel(sysId);
}

function heartSVG(id,s){
  const c=s.color;

function handleSVGClick(e,sysId){
  const target=e.target.closest('[data-part]');
  if(!target)return;
  const partKey=target.dataset.part;
  if(partKey)selectPart(sysId,partKey);
}

function initQuiz(){
  quizAnswers=[];
  document.getElementById('result-card').className='result-card';
  const tx=TX[lang];
  document.getElementById('btn-retry').textContent=tx.btnRetry;
  // randomize answers
  const questions=tx.questions.map(q=>{
    const indexed=q.opts.map((o,i)=>({t:o,c:i===q.ans})).sort(()=>Math.random()-.5);
    return {...q,opts:indexed.map(x=>x.t),ans:indexed.findIndex(x=>x.c)};
  });
  document.getElementById('quiz-body').innerHTML=questions.map((q,i)=>`
    <div class="q-block" id="qb-${i}">
      <div class="q-num">🧬 Q${i+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts">
        ${q.opts.map((o,j)=>`<button class="q-opt" id="qo-${i}-${j}" onclick="answerQ(${i},${j},${q.ans},'${q.exp.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
      </div>
      <div class="q-fb" id="qfb-${i}"></div>
    </div>`).join('');
}

function answerQ(qi,oi,ans,exp){
  if(quizAnswers[qi]!==undefined)return;
  quizAnswers[qi]=oi;
  const ok=oi===ans;
  for(let j=0;j<4;j++){const btn=document.getElementById(`qo-${qi}-${j}`);if(!btn)continue;btn.disabled=true;if(j===ans)btn.classList.add(ok?'correct':'reveal');if(j===oi&&!ok)btn.classList.add('wrong')}
  const fb=document.getElementById(`qfb-${qi}`);
  fb.className='q-fb show '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'✓ ':'✗ ')+exp;
  document.getElementById(`qb-${qi}`).style.borderColor=ok?'var(--immun)':'var(--heart)';
  const total=TX[lang].questions.length;
  if(quizAnswers.filter(a=>a!==undefined).length===total)setTimeout(showResults,500);
}

function showResults(){
  const tx=TX[lang];
  const total=tx.questions.length;
  const correct=quizAnswers.filter((a,i)=>a===TX[lang].questions.map((q,qi)=>{const indexed=q.opts.map((o,j)=>({t:o,c:j===q.ans})).sort(()=>0);return indexed.findIndex(x=>x.c)})[i]).length;
  const pct=Math.round((quizAnswers.filter((a,i,arr)=>{
    const body=document.getElementById('quiz-body');
    const corr=body.querySelectorAll('.q-opt.correct')[i];
    return corr&&corr.classList.contains('correct');
  }).length/total)*100);
  // simpler: count green buttons
  const greens=document.querySelectorAll('.q-opt.correct').length;
  const pctReal=Math.round((greens/total)*100);
  const v=tx.verdicts.find(x=>pctReal>=x.min);
  document.getElementById('result-pct').textContent=v.icon+' '+pctReal+'%';
  document.getElementById('result-msg').textContent=v.msg;
  document.getElementById('result-card').className='result-card show';
  document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'center'});
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
applyTexts();renderTabs();renderPanel('heart');initQuiz();
</script>

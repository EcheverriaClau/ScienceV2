<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Examen final · STE Sec 3 · Québec</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--bg2:#0c1020;--bg3:#121828;--bg4:#181f30;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e0ecff;--muted:#4e6888;
  --accent:#ffd166;--blue:#5bc8ff;--green:#4ddc8a;--red:#ff5f6d;--purple:#a78bfa;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px;
}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

#lang-bar{position:fixed;top:0;right:0;z-index:200;display:flex;gap:5px;padding:.6rem .9rem;background:rgba(6,8,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);border-left:1px solid var(--border);border-radius:0 0 0 10px}
.lb{font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.lb.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.screen{display:none;animation:fadeUp .35s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── INTRO SCREEN ── */
.intro-hero{text-align:center;padding:2.5rem 0 2rem}
.intro-badge{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border2);border-radius:20px;padding:4px 14px;margin-bottom:1rem;display:inline-block}
.intro-icon{font-size:56px;display:block;margin-bottom:.75rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.intro-title{font-size:clamp(2rem,6vw,3rem);font-weight:900;letter-spacing:-.04em;margin-bottom:.5rem}
.intro-title em{font-style:normal;color:var(--accent)}
.intro-sub{font-size:14px;color:var(--muted);margin-bottom:2rem}

.exam-info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.eig-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem .75rem;text-align:center}
.eig-num{font-size:2rem;font-weight:900;display:block;margin-bottom:3px}
.eig-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em}

.rules-box{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:13px;line-height:1.8;color:rgba(224,236,255,.85)}
.rules-box h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:.5rem}
.rule-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:.35rem}
.rule-item::before{content:'→';color:var(--accent);flex-shrink:0;font-family:var(--mono)}

.btn-start-exam{
  width:100%;padding:16px;border:none;border-radius:var(--r);
  font-family:var(--font);font-size:16px;font-weight:900;
  background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
  cursor:pointer;letter-spacing:.04em;
  box-shadow:0 0 32px rgba(255,209,102,.35);
  transition:transform .15s,box-shadow .2s;
}
.btn-start-exam:hover{transform:translateY(-2px);box-shadow:0 0 48px rgba(255,209,102,.5)}

/* ── EXAM SCREEN ── */
.exam-topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.75rem;flex-wrap:wrap;gap:8px;
}
.exam-prog-info{font-family:var(--mono);font-size:11px;color:var(--muted)}
.exam-score-live{font-family:var(--mono);font-size:13px;color:var(--green);font-weight:700}

/* timer */
.timer-bar-wrap{height:4px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:.5rem;overflow:hidden}
.timer-bar{height:100%;border-radius:2px;transition:width .1s linear,background .3s}
.prog-wrap{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:.4rem;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),#f59e0b);border-radius:2px;transition:width .4s ease}
.prog-text{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;margin-bottom:1rem}

/* universe tag */
.univ-tag{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);display:inline-block;margin-bottom:.75rem}

/* motiv banner */
.motiv-banner{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:.6rem 1rem;font-size:13px;color:var(--purple);text-align:center;font-style:italic;margin-bottom:.75rem;display:none;animation:fadeUp .3s ease}
.motiv-banner.show{display:block}

.question-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;font-size:16px;font-weight:700;line-height:1.55;color:var(--text);margin-bottom:1rem}
.q-num-tag{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;display:block;margin-bottom:.4rem}

#options{display:grid;gap:7px;margin-bottom:.85rem}
.opt-btn{display:block;width:100%;text-align:left;padding:11px 15px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13.5px;color:var(--text);cursor:pointer;transition:all .15s;line-height:1.45;position:relative}
.opt-btn:hover:not(:disabled){border-color:var(--border2);background:var(--bg3);transform:translateX(4px)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:rgba(77,220,138,.12);border-color:var(--green);color:#a7f3ca;animation:popIn .2s ease}
.opt-btn.wrong{background:rgba(255,95,109,.1);border-color:var(--red);color:#fca5a5}
.opt-btn.reveal{background:rgba(77,220,138,.07);border-color:rgba(77,220,138,.5);color:#a7f3ca}
@keyframes popIn{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}

.feedback-box{display:none;border-radius:8px;padding:.85rem 1rem;font-size:13px;line-height:1.65;margin-bottom:.75rem}
.feedback-box.show{display:block;animation:fadeUp .2s ease}
.feedback-box.ok{background:rgba(77,220,138,.08);color:#a7f3ca;border-left:3px solid var(--green)}
.feedback-box.bad{background:rgba(255,95,109,.08);color:#fca5a5;border-left:3px solid var(--red)}
.feedback-box.time{background:rgba(255,209,102,.08);color:#fde68a;border-left:3px solid var(--accent)}

#btn-next{display:none;width:100%;align-items:center;justify-content:center;gap:8px;padding:12px 20px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);font-family:var(--font);font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s}
#btn-next:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,209,102,.05)}

/* ── RESULTS SCREEN ── */
.results-hero{text-align:center;padding:2rem 0 1.5rem}
.res-icon-big{font-size:64px;display:block;margin-bottom:.75rem;animation:bounceIn .5s ease}
@keyframes bounceIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
#res-pct{font-size:4rem;font-weight:900;letter-spacing:-.04em;background:linear-gradient(135deg,var(--accent),#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;margin-bottom:.3rem}
#res-msg{font-size:18px;font-weight:700;display:block;margin-bottom:.3rem}
#res-motiv{font-size:13px;color:var(--muted);font-style:italic;display:block;margin-bottom:1.5rem}

/* stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
@media(max-width:480px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.85rem .5rem;text-align:center}
.stat-num{font-size:1.8rem;font-weight:900;display:block;margin-bottom:2px}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.06em}

/* per-universe breakdown */
.univ-breakdown{margin-bottom:1.25rem}
.ub-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.6rem}
.ub-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ub-icon{font-size:16px;width:22px;flex-shrink:0}
.ub-name{font-size:12px;color:var(--muted);width:140px;flex-shrink:0}
.ub-bar-wrap{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.ub-bar{height:100%;border-radius:3px;transition:width .8s ease}
.ub-score{font-family:var(--mono);font-size:11px;color:var(--text);width:40px;text-align:right;flex-shrink:0}

/* review section */
.review-wrap{margin-bottom:1.25rem}
.review-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.6rem;display:flex;align-items:center;gap:8px}
.review-title::after{content:'';flex:1;height:1px;background:var(--border)}
.review-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;margin-bottom:6px;font-size:12.5px;line-height:1.6}
.review-item.ok-item{border-left:3px solid var(--green)}
.review-item.bad-item{border-left:3px solid var(--red)}
.review-q{color:var(--text);margin-bottom:3px;font-weight:600}
.review-ans{color:var(--muted)}
.review-ans .correct-ans{color:var(--green)}
.review-ans .wrong-ans{color:var(--red)}

.btn-retry-exam{width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:900;color:#fff;cursor:pointer;margin-bottom:8px;transition:transform .15s,box-shadow .2s;box-shadow:0 0 24px rgba(255,209,102,.3)}
.btn-retry-exam:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(255,209,102,.5)}
.btn-home-exam{width:100%;padding:11px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);font-family:var(--font);font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s}
.btn-home-exam:hover{color:var(--text);border-color:var(--text)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="lang-bar">
  <button class="lb active" onclick="setLang('fr')">FR</button>
  <button class="lb" onclick="setLang('en')">EN</button>
  <button class="lb" onclick="setLang('es')">ES</button>
</div>

<div id="app">

  <!-- INTRO -->
  <div id="screen-intro" class="screen active">
    <div class="intro-hero">
      <span class="intro-badge" id="intro-badge">STE Sec 3 · Québec · PFEQ</span>
      <span class="intro-icon">🎯</span>
      <h1 class="intro-title" id="intro-title">Examen <em>final</em></h1>
      <p class="intro-sub" id="intro-sub"></p>
    </div>
    <div class="exam-info-grid">
      <div class="eig-card"><span class="eig-num" style="color:var(--accent)">25</span><span class="eig-lbl" id="eig-q"></span></div>
      <div class="eig-card"><span class="eig-num" style="color:var(--blue)">45s</span><span class="eig-lbl" id="eig-t"></span></div>
      <div class="eig-card"><span class="eig-num" style="color:var(--green)">4</span><span class="eig-lbl" id="eig-u"></span></div>
    </div>
    <div class="rules-box">
      <h3 id="rules-title">📋 Règles</h3>
      <div id="rules-list"></div>
    </div>
    <button class="btn-start-exam" id="btn-start" onclick="startExam()"></button>
  </div>

  <!-- EXAM -->
  <div id="screen-exam" class="screen">
    <div class="exam-topbar">
      <span class="exam-prog-info" id="exam-prog"></span>
      <span class="exam-score-live" id="exam-score-live"></span>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <p class="prog-text" id="prog-text"></p>
    <div class="motiv-banner" id="motiv-banner"></div>
    <div class="univ-tag" id="univ-tag"></div>
    <div class="question-card">
      <span class="q-num-tag" id="q-num-tag"></span>
      <span id="question-text"></span>
    </div>
    <div id="options"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button id="btn-next" onclick="nextQuestion()"></button>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div class="results-hero">
      <span class="res-icon-big" id="res-icon">🎯</span>
      <span id="res-pct">0%</span>
      <span id="res-msg"></span>
      <span id="res-motiv"></span>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><span class="stat-num" id="rs-correct" style="color:var(--green)">0</span><span class="stat-label" id="rsl-correct"></span></div>
      <div class="stat-card"><span class="stat-num" id="rs-wrong" style="color:var(--red)">0</span><span class="stat-label" id="rsl-wrong"></span></div>
      <div class="stat-card"><span class="stat-num" id="rs-streak" style="color:var(--accent)">0</span><span class="stat-label" id="rsl-streak"></span></div>
      <div class="stat-card"><span class="stat-num" id="rs-time" style="color:var(--blue)">0s</span><span class="stat-label" id="rsl-time"></span></div>
    </div>
    <div class="univ-breakdown">
      <div class="ub-title" id="ub-title"></div>
      <div id="ub-rows"></div>
    </div>
    <div class="review-wrap">
      <div class="review-title" id="review-title"></div>
      <div id="review-list"></div>
    </div>
    <button class="btn-retry-exam" id="btn-retry" onclick="startExam()"></button>
    <button class="btn-home-exam" id="btn-home" onclick="goHome()"></button>
  </div>

</div>

// ══════════════════════════════════════════════════
//  25 QUESTIONS — all 4 universes (≥6 each)
// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
//  BUILD WITH RANDOMIZED ANSWERS
// ══════════════════════════════════════════════════
function buildQ(){
  return Q_RAW.map(raw=>{
    const q={u:raw.u};
    ['fr','en','es'].forEach(l=>{
      const d=raw[l];
      const idx=d.o.map((o,i)=>({t:o,c:i===d.a,e:d.e}));
      const shuffled=idx.sort(()=>Math.random()-.5);
      q[l]={q:d.q,opts:shuffled.map(x=>x.t),ans:shuffled.findIndex(x=>x.c),exp:d.e};
    });
    return q;
  });
}

// ══════════════════════════════════════════════════
//  LANG
// ══════════════════════════════════════════════════
function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  renderIntro();
}

// ══════════════════════════════════════════════════
//  INTRO
// ══════════════════════════════════════════════════
function renderIntro(){
  const tx=TX[lang];
  document.getElementById('intro-badge').textContent=tx.badge;
  document.getElementById('intro-title').innerHTML=tx.title;
  document.getElementById('intro-sub').textContent=tx.sub;
  document.getElementById('eig-q').textContent=tx.eigQ;
  document.getElementById('eig-t').textContent=tx.eigT;
  document.getElementById('eig-u').textContent=tx.eigU;
  document.getElementById('rules-title').textContent=tx.rulesTitle;
  document.getElementById('rules-list').innerHTML=tx.rules.map(r=>`<div class="rule-item">${r}</div>`).join('');
  document.getElementById('btn-start').textContent=tx.btnStart;
}

// ══════════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════════
function startExam(){
  questions=shuffle(buildQ());
  current=0;score=0;streak=0;maxStreak=0;results=[];startTimes=[];answered=false;
  showScreen('screen-exam');
  renderQuestion();
}

//  QUESTION
// ══════════════════════════════════════════════════
function renderQuestion(){
  answered=false;
  const q=questions[current];const d=q[lang];
  const tx=TX[lang];
  const total=questions.length;
  const pct=Math.round((current/total)*100);

  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${tx.q}${current+1} / ${total}`;
  document.getElementById('exam-prog').textContent=`${tx.q}${current+1} / ${total}`;
  document.getElementById('exam-score-live').textContent=`${score} ${tx.score}`;

  const uEl=document.getElementById('univ-tag');
  uEl.textContent=tx.univIcons[q.u]+' '+tx.univNames[q.u];
  uEl.style.color=tx.univColors[q.u];

  document.getElementById('q-num-tag').textContent=`${tx.q.toUpperCase()}${current+1}`;
  document.getElementById('question-text').textContent=d.q;
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('motiv-banner').className='motiv-banner';

  document.getElementById('options').innerHTML=d.opts.map((o,i)=>
    `<button class="opt-btn" onclick="answer(${i})">${o}</button>`
  ).join('');

  startTimes[current]=Date.now();
  startTimer();
}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerVal=MAX_TIME;
  updateTimerUI(MAX_TIME);
  timerInterval=setInterval(()=>{
    timerVal--;
    updateTimerUI(timerVal);
    if(timerVal<=0){clearInterval(timerInterval);if(!answered)timeOut()}
  },1000);
}

function updateTimerUI(val){
  const pct=(val/MAX_TIME)*100;
  const bar=document.getElementById('timer-bar');
  bar.style.width=pct+'%';
  bar.style.background=val>20?'var(--blue)':val>10?'var(--accent)':'var(--red)';
}

function answer(i){
  if(answered)return;
  answered=true;
  clearInterval(timerInterval);
  const q=questions[current];const d=q[lang];const ok=i===d.ans;
  const timeTaken=Math.round((Date.now()-startTimes[current])/1000);
  startTimes[current]=timeTaken;

  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);

  if(ok){
    const timeBonus=Math.max(0,Math.round((timerVal/MAX_TIME)*20));
    const pts=4+timeBonus;
    score+=pts;streak++;maxStreak=Math.max(streak,maxStreak);
    document.querySelectorAll('.opt-btn')[i].classList.add('correct');
    const fb=document.getElementById('feedback-box');
    fb.className='feedback-box show ok';
    fb.innerHTML=`✓ +${pts} pts · ${d.exp}`;
    if(streak>=3){
      const mb=document.getElementById('motiv-banner');
      mb.textContent=t('motivStreak')[Math.floor(Math.random()*t('motivStreak').length)];
      mb.className='motiv-banner show';
    }
  } else {
    streak=0;
    document.querySelectorAll('.opt-btn')[i].classList.add('wrong');
    document.querySelectorAll('.opt-btn')[d.ans].classList.add('reveal');
    const fb=document.getElementById('feedback-box');
    fb.className='feedback-box show bad';
    fb.innerHTML=`✗ ${d.exp}`;
  }

  results.push({u:q.u,correct:ok,yourAns:d.opts[i],correctAns:d.opts[d.ans],q:d.q});
  document.getElementById('exam-score-live').textContent=`${score} ${t('score')}`;

  const btn=document.getElementById('btn-next');
  btn.style.display='flex';
  btn.textContent=current<questions.length-1?t('next'):t('finish');
}

function timeOut(){
  answered=true;
  const q=questions[current];const d=q[lang];
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  document.querySelectorAll('.opt-btn')[d.ans].classList.add('reveal');
  const fb=document.getElementById('feedback-box');
  fb.className='feedback-box show time';
  fb.innerHTML=`${t('timeout')} → ${d.exp}`;
  results.push({u:q.u,correct:false,yourAns:'—',correctAns:d.opts[d.ans],q:d.q});
  streak=0;
  const btn=document.getElementById('btn-next');
  btn.style.display='flex';
  btn.textContent=current<questions.length-1?t('next'):t('finish');
}

function nextQuestion(){
  current++;
  if(current>=questions.length){showResults();return}
  renderQuestion();
}

// ══════════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════════
function showResults(){
  const tx=TX[lang];
  const total=questions.length;
  const correct=results.filter(r=>r.correct).length;
  const pct=Math.round((correct/total)*100);
  const v=tx.verdicts.find(x=>pct>=x.min);
  const avgT=startTimes.length?Math.round(startTimes.filter(x=>typeof x==='number').reduce((a,b)=>a+b,0)/startTimes.filter(x=>typeof x==='number').length):0;

  document.getElementById('res-icon').textContent=v.icon;
  document.getElementById('res-pct').textContent=pct+'%';
  document.getElementById('res-msg').textContent=v.msg;
  document.getElementById('res-motiv').textContent=v.motiv;
  document.getElementById('rs-correct').textContent=correct;
  document.getElementById('rs-wrong').textContent=total-correct;
  document.getElementById('rs-streak').textContent=maxStreak;
  document.getElementById('rs-time').textContent=avgT+'s';
  document.getElementById('rsl-correct').textContent=tx.rsLabels.correct;
  document.getElementById('rsl-wrong').textContent=tx.rsLabels.wrong;
  document.getElementById('rsl-streak').textContent=tx.rsLabels.streak;
  document.getElementById('rsl-time').textContent=tx.rsLabels.time;
  document.getElementById('ub-title').textContent=tx.ubTitle;
  document.getElementById('review-title').textContent=tx.reviewTitle;
  document.getElementById('btn-retry').textContent=tx.btnRetry;
  document.getElementById('btn-home').textContent=tx.btnHome;

  // Per-universe breakdown
  const univs=['mat','viv','ter','tec'];
  document.getElementById('ub-rows').innerHTML=univs.map(u=>{
    const uRes=results.filter(r=>r.u===u);
    const uCorrect=uRes.filter(r=>r.correct).length;
    const uTotal=uRes.length;
    const uPct=uTotal?Math.round((uCorrect/uTotal)*100):0;
    const col=tx.univColors[u];
    return `<div class="ub-row">
      <span class="ub-icon">${tx.univIcons[u]}</span>
      <span class="ub-name">${tx.univNames[u]}</span>
      <div class="ub-bar-wrap"><div class="ub-bar" style="width:${uPct}%;background:${col}"></div></div>
      <span class="ub-score" style="color:${uPct>=60?col:'var(--red)'}">${uCorrect}/${uTotal}</span>
    </div>`;
  }).join('');

  // Wrong answers review
  const wrong=results.filter(r=>!r.correct);
  if(wrong.length===0){
    document.getElementById('review-list').innerHTML=`<div style="font-size:13px;color:var(--green);padding:.5rem">🎉 Toutes les réponses correctes !</div>`;
  } else {
    document.getElementById('review-list').innerHTML=wrong.slice(0,8).map(r=>`
      <div class="review-item bad-item">
        <div class="review-q">${r.q}</div>
        <div class="review-ans">
          <span class="wrong-ans">✗ ${r.yourAns}</span> →
          <span class="correct-ans">✓ ${r.correctAns}</span>
        </div>
      </div>`).join('');
  }

  showScreen('screen-results');
}

function goHome(){window.location.href='index.html'}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}

// Stars
(function(){const c=document.getElementById('bg-canvas');const ctx=c.getContext('2d');let s=[];function r(){c.width=window.innerWidth;c.height=window.innerHeight;s=Array.from({length:80},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+.2,o:Math.random()*.4+.05,sp:Math.random()*.4+.05,t:Math.random()*Math.PI*2}))}function d(){ctx.clearRect(0,0,c.width,c.height);const n=Date.now()/1000;s.forEach(st=>{ctx.beginPath();ctx.arc(st.x,st.y,st.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${st.o*(0.5+0.5*Math.sin(n*st.sp+st.t))})`;ctx.fill()});requestAnimationFrame(d)}window.addEventListener('resize',r);r();d()})();

renderIntro();
</script>

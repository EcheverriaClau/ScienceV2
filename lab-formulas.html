<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Formules interactives · STE Sec 3</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0f1624;--bg3:#161f30;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#ddeeff;--muted:#4e6a8a;
  --yellow:#ffd166;--blue:#5bc8ff;--green:#4ddc8a;
  --red:#ff5f6d;--orange:#ff8c42;--purple:#b48bfa;--pink:#ff6b9d;
  --font:'Figtree',sans-serif;--mono:'Fira Code',monospace;
  --r:14px;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* animated grid background */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(91,200,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(91,200,255,0.03) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;z-index:0;
}

/* ── LANG BAR ── */
#lang-bar{position:relative;z-index:10;display:flex;gap:6px;justify-content:flex-end;padding:1rem 1.25rem 0}
.lb{font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:5px 12px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.lb.active{background:var(--yellow);color:var(--bg);border-color:var(--yellow)}

#app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:1.25rem 1.25rem 4rem}

/* ── HERO ── */
.hero{text-align:center;padding:1.25rem 0 2rem}
.hero-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.6rem}
.hero h1{font-size:clamp(2rem,6vw,3rem);font-weight:900;letter-spacing:-.04em;line-height:1.05;margin-bottom:.4rem}
.hero h1 em{font-style:normal;color:var(--yellow)}
.hero p{font-size:13px;color:var(--muted)}

/* ── CATEGORY TABS ── */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.cat-tab{
  padding:8px 16px;border-radius:20px;border:1px solid var(--border2);
  background:var(--bg2);font-family:var(--font);font-size:12px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.cat-tab:hover{color:var(--text);border-color:var(--text)}
.cat-tab.active{border-width:1.5px;color:var(--bg);font-weight:700}

/* ── FORMULA CARDS ── */
.formula-grid{display:grid;gap:1rem}

.formula-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  transition:border-color .2s;
}
.formula-card:hover{border-color:var(--border2)}

.fc-header{
  padding:1rem 1.25rem .75rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
}
.fc-icon{font-size:24px;flex-shrink:0}
.fc-title-wrap{flex:1}
.fc-title{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
.fc-subtitle{font-size:12px;color:var(--muted);font-family:var(--mono)}
.fc-expand{font-size:18px;color:var(--muted);transition:transform .25s}
.fc-expand.open{transform:rotate(180deg)}

.fc-body{display:none;padding:1.25rem}
.fc-body.open{display:block;animation:fadeDown .25s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── FORMULA DISPLAY ── */
.formula-display{
  text-align:center;
  background:var(--bg3);border-radius:10px;
  padding:1rem 1.5rem;margin-bottom:1.25rem;
  border:1px solid var(--border);
}
.formula-main{
  font-family:var(--mono);font-size:clamp(1.2rem,4vw,1.8rem);
  font-weight:600;letter-spacing:.05em;color:var(--yellow);
  margin-bottom:.35rem;
}
.formula-vars{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
.fv{background:var(--bg2);padding:2px 8px;border-radius:4px;border:1px solid var(--border2)}

/* ── MAGIC TRIANGLE ── */
.triangle-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:1.25rem;gap:.5rem}
.triangle-svg-wrap{position:relative;width:160px;height:140px}
.triangle-svg-wrap svg{width:100%;height:100%}
.tri-zone{cursor:pointer;transition:opacity .15s}
.tri-zone:hover{opacity:.8}
.tri-label{font-family:var(--mono);font-size:13px;font-weight:600;pointer-events:none}
.triangle-hint{font-size:12px;color:var(--muted);font-family:var(--mono);text-align:center}

/* ── CALCULATOR ── */
.calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.25rem}

.calc-field{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:.85rem 1rem;
  transition:border-color .2s;position:relative;
}
.calc-field.solving{border-color:var(--yellow);background:rgba(255,209,102,.06)}
.calc-field.locked{opacity:.6}
.cf-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:.4rem;display:flex;justify-content:space-between;align-items:center}
.cf-unit{color:var(--text);font-size:11px}
.cf-input{
  width:100%;background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:1.3rem;font-weight:600;
  color:var(--text);padding:0;
}
.cf-input.result-field{color:var(--yellow)}
.cf-input::-webkit-outer-spin-button,
.cf-input::-webkit-inner-spin-button{-webkit-appearance:none}
.cf-solve-indicator{
  position:absolute;top:8px;right:10px;
  font-size:9px;font-family:var(--mono);
  color:var(--yellow);letter-spacing:.06em;
  display:none;
}
.calc-field.solving .cf-solve-indicator{display:block}

.calc-actions{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.btn-solve{
  flex:1;padding:11px 20px;border:none;border-radius:10px;
  font-family:var(--font);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-solve:hover{transform:translateY(-2px)}
.btn-clear-calc{
  padding:11px 16px;border:1px solid var(--border2);border-radius:10px;
  background:transparent;font-family:var(--font);font-size:13px;
  color:var(--muted);cursor:pointer;transition:all .2s;
}
.btn-clear-calc:hover{color:var(--text);border-color:var(--text)}

.solve-target-row{
  display:flex;gap:6px;align-items:center;margin-bottom:1rem;
  flex-wrap:wrap;
}
.solve-target-label{font-size:12px;color:var(--muted);font-family:var(--mono)}
.solve-target-btn{
  font-family:var(--mono);font-size:11px;padding:4px 10px;
  border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;
}
.solve-target-btn.active{background:var(--yellow);color:var(--bg);border-color:var(--yellow)}

/* ── RESULT BOX ── */
.result-box{
  background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.3);
  border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;
  display:none;animation:fadeDown .2s ease;
}
.result-box.show{display:block}
.result-equation{font-family:var(--mono);font-size:1.1rem;font-weight:600;color:var(--yellow);margin-bottom:.35rem}
.result-check{font-size:12px;color:rgba(255,209,102,.7)}

/* ── EXAMPLES ── */
.examples-wrap{margin-bottom:1rem}
.examples-title{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.6rem}
.example-item{
  background:var(--bg3);border-radius:8px;padding:.75rem 1rem;
  margin-bottom:6px;border:1px solid var(--border);
  cursor:pointer;transition:border-color .15s;
}
.example-item:hover{border-color:var(--border2)}
.ex-problem{font-size:13px;line-height:1.55;margin-bottom:.4rem}
.ex-solution{font-family:var(--mono);font-size:12px;color:var(--green);display:none}
.ex-solution.show{display:block}
.ex-hint{font-size:11px;color:var(--muted);margin-top:3px}

/* ── TIPS & ALERTS ── */
.tip-box{
  border-radius:8px;padding:.75rem 1rem;margin-bottom:.6rem;
  font-size:12.5px;line-height:1.65;display:flex;gap:10px;
}
.tip-icon{flex-shrink:0;font-size:16px}
.tip-green{background:rgba(77,220,138,.08);border-left:3px solid var(--green);color:rgba(220,232,248,.85)}
.tip-yellow{background:rgba(255,209,102,.08);border-left:3px solid var(--yellow);color:rgba(220,232,248,.85)}
.tip-red{background:rgba(255,95,109,.08);border-left:3px solid var(--red);color:rgba(220,232,248,.85)}
.tip-blue{background:rgba(91,200,255,.08);border-left:3px solid var(--blue);color:rgba(220,232,248,.85)}

/* ── SECTION LABEL ── */
.sec{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:.85rem;margin-top:1.5rem}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,209,102,.4)}50%{box-shadow:0 0 0 6px rgba(255,209,102,0)}}
</style>
</head>
<body>
<div id="lang-bar">
  <button class="lb active" onclick="setLang('fr')">FR</button>
  <button class="lb" onclick="setLang('en')">EN</button>
  <button class="lb" onclick="setLang('es')">ES</button>
</div>
<div id="app">

  <div class="hero">
    <span class="hero-tag" id="hero-tag">STE Secondaire 3 · Québec</span>
    <h1 id="hero-h1">Formules <em>interactives</em></h1>
    <p id="hero-p">Entre 2 valeurs connues → calcule la 3e automatiquement</p>
  </div>

  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="formula-grid" id="formula-grid"></div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  ALL FORMULA DATA
// ═══════════════════════════════════════════════════════
const FORMULAS = [
  // ═══ CHIMIE ════════════════════════════════════════
  {
    id:'masse-vol', cat:'chimie',
    icon:'⚗️',
    color:'#5bc8ff',
    btnColor:'linear-gradient(135deg,#1565c0,#0277bd)',
    fr:{
      title:'Masse volumique',subtitle:'ρ = m / V',
      vars:{a:{sym:'ρ',name:'Masse volumique',unit:'g/mL ou g/cm³'},b:{sym:'m',name:'Masse',unit:'g'},c:{sym:'V',name:'Volume',unit:'mL ou cm³'}},
      triangle:{top:'ρ',bl:'m',br:'V',hint:'Couvre la valeur cherchée → lis la formule'},
      targets:['ρ (masse volumique)','m (masse)','V (volume)'],
      formulas:['ρ = m ÷ V','m = ρ × V','V = m ÷ ρ'],
      examples:[
        {p:'Un liquide a une masse de 25,2 g et un volume de 18 mL. Quelle est sa masse volumique ?',s:'ρ = 25,2 ÷ 18 = 1,4 g/mL → c\'est probablement du glycérol'},
        {p:'Quelle est la masse d\'un cube d\'or de 5 cm³ ? (ρ_or = 19,3 g/cm³)',s:'m = 19,3 × 5 = 96,5 g'},
        {p:'Quel volume occupe 150 g d\'eau ? (ρ_eau = 1 g/mL)',s:'V = 150 ÷ 1 = 150 mL'},
      ],
      tips:[
        {type:'green',icon:'💧',text:'L\'eau pure a une masse volumique de 1 g/mL — c\'est la référence universelle. Si ρ < 1, l\'objet flotte !'},
        {type:'yellow',icon:'⚠️',text:'Attention aux unités : 1 g/cm³ = 1 g/mL = 1000 kg/m³. Vérifie toujours que m et V ont des unités compatibles.'},
        {type:'blue',icon:'🧊',text:'La glace (ρ = 0,92 g/mL) flotte dans l\'eau (ρ = 1 g/mL) — c\'est pour ça que les icebergs flottent !'},
      ],
    },
    en:{
      title:'Density',subtitle:'ρ = m / V',
      vars:{a:{sym:'ρ',name:'Density',unit:'g/mL or g/cm³'},b:{sym:'m',name:'Mass',unit:'g'},c:{sym:'V',name:'Volume',unit:'mL or cm³'}},
      triangle:{top:'ρ',bl:'m',br:'V',hint:'Cover the value you want → read the formula'},
      targets:['ρ (density)','m (mass)','V (volume)'],
      formulas:['ρ = m ÷ V','m = ρ × V','V = m ÷ ρ'],
      examples:[
        {p:'A liquid has a mass of 25.2 g and a volume of 18 mL. What is its density?',s:'ρ = 25.2 ÷ 18 = 1.4 g/mL → likely glycerol'},
        {p:'What is the mass of a 5 cm³ gold cube? (ρ_gold = 19.3 g/cm³)',s:'m = 19.3 × 5 = 96.5 g'},
        {p:'What volume does 150 g of water occupy? (ρ_water = 1 g/mL)',s:'V = 150 ÷ 1 = 150 mL'},
      ],
      tips:[
        {type:'green',icon:'💧',text:'Pure water has a density of 1 g/mL — the universal reference. If ρ < 1, the object floats!'},
        {type:'yellow',icon:'⚠️',text:'Watch your units: 1 g/cm³ = 1 g/mL = 1000 kg/m³. Always check that m and V units are compatible.'},
        {type:'blue',icon:'🧊',text:'Ice (ρ = 0.92 g/mL) floats in water (ρ = 1 g/mL) — that\'s why icebergs float!'},
      ],
    },
    es:{
      title:'Masa volumétrica',subtitle:'ρ = m / V',
      vars:{a:{sym:'ρ',name:'Masa volumétrica',unit:'g/mL o g/cm³'},b:{sym:'m',name:'Masa',unit:'g'},c:{sym:'V',name:'Volumen',unit:'mL o cm³'}},
      triangle:{top:'ρ',bl:'m',br:'V',hint:'Cubre el valor buscado → lee la fórmula'},
      targets:['ρ (masa volumétrica)','m (masa)','V (volumen)'],
      formulas:['ρ = m ÷ V','m = ρ × V','V = m ÷ ρ'],
      examples:[
        {p:'Un líquido tiene una masa de 25,2 g y un volumen de 18 mL. ¿Cuál es su masa volumétrica?',s:'ρ = 25,2 ÷ 18 = 1,4 g/mL → probablemente glicerol'},
        {p:'¿Cuál es la masa de un cubo de oro de 5 cm³? (ρ_oro = 19,3 g/cm³)',s:'m = 19,3 × 5 = 96,5 g'},
        {p:'¿Qué volumen ocupa 150 g de agua? (ρ_agua = 1 g/mL)',s:'V = 150 ÷ 1 = 150 mL'},
      ],
      tips:[
        {type:'green',icon:'💧',text:'El agua pura tiene una masa volumétrica de 1 g/mL — es la referencia universal. Si ρ < 1, ¡el objeto flota!'},
        {type:'yellow',icon:'⚠️',text:'Cuidado con las unidades: 1 g/cm³ = 1 g/mL = 1000 kg/m³. Verifica siempre que m y V tengan unidades compatibles.'},
        {type:'blue',icon:'🧊',text:'El hielo (ρ = 0,92 g/mL) flota en agua (ρ = 1 g/mL) — ¡por eso flotan los icebergs!'},
      ],
    },
    fields:[
      {key:'a',sym:'ρ',unit:'g/mL',min:0.01,max:25,step:0.01,default:''},
      {key:'b',sym:'m',unit:'g',min:0.1,max:10000,step:0.1,default:''},
      {key:'c',sym:'V',unit:'mL',min:0.1,max:10000,step:0.1,default:''},
    ],
    solve:(a,b,c)=>{
      if(b!==null&&c!==null) return {key:'a',val:b/c,eq:`ρ = ${b} ÷ ${c} = ${fmt(b/c)} g/mL`};
      if(a!==null&&c!==null) return {key:'b',val:a*c,eq:`m = ${a} × ${c} = ${fmt(a*c)} g`};
      if(a!==null&&b!==null) return {key:'c',val:b/a,eq:`V = ${b} ÷ ${a} = ${fmt(b/a)} mL`};
      return null;
    },
  },
  {
    id:'concentration', cat:'chimie',
    icon:'🧫', color:'#4ddc8a', btnColor:'linear-gradient(135deg,#1b5e20,#2e7d32)',
    fr:{
      title:'Concentration massique',subtitle:'C = m / V',
      vars:{a:{sym:'C',name:'Concentration',unit:'g/L'},b:{sym:'m',name:'Masse de soluté',unit:'g'},c:{sym:'V',name:'Volume de solution',unit:'L'}},
      triangle:{top:'C',bl:'m',br:'V',hint:'Couvre la valeur cherchée'},
      targets:['C (concentration)','m (masse soluté)','V (volume solution)'],
      formulas:['C = m ÷ V','m = C × V','V = m ÷ C'],
      examples:[
        {p:'On dissout 15 g de sel dans 0,5 L d\'eau. Quelle est la concentration ?',s:'C = 15 ÷ 0,5 = 30 g/L'},
        {p:'Quelle masse de sucre faut-il pour préparer 2 L d\'une solution à 50 g/L ?',s:'m = 50 × 2 = 100 g'},
        {p:'Dans quel volume faut-il dissoudre 8 g pour obtenir C = 16 g/L ?',s:'V = 8 ÷ 16 = 0,5 L'},
      ],
      tips:[
        {type:'green',icon:'💡',text:'Attention : V est en litres (L), pas en mL ! 500 mL = 0,5 L. Toujours convertir avant de calculer.'},
        {type:'yellow',icon:'⚠️',text:'La concentration ne change PAS si on ajoute plus de soluté ET plus de solvant en proportion égale.'},
        {type:'blue',icon:'🔬',text:'L\'eau de mer a une concentration en sel d\'environ 35 g/L. L\'eau potable < 0,3 g/L de minéraux totaux.'},
      ],
    },
    en:{
      title:'Mass concentration',subtitle:'C = m / V',
      vars:{a:{sym:'C',name:'Concentration',unit:'g/L'},b:{sym:'m',name:'Solute mass',unit:'g'},c:{sym:'V',name:'Solution volume',unit:'L'}},
      triangle:{top:'C',bl:'m',br:'V',hint:'Cover the value you want'},
      targets:['C (concentration)','m (solute mass)','V (solution volume)'],
      formulas:['C = m ÷ V','m = C × V','V = m ÷ C'],
      examples:[
        {p:'15 g of salt is dissolved in 0.5 L of water. What is the concentration?',s:'C = 15 ÷ 0.5 = 30 g/L'},
        {p:'What mass of sugar is needed to prepare 2 L of a 50 g/L solution?',s:'m = 50 × 2 = 100 g'},
        {p:'In what volume should 8 g be dissolved to get C = 16 g/L?',s:'V = 8 ÷ 16 = 0.5 L'},
      ],
      tips:[
        {type:'green',icon:'💡',text:'Note: V is in litres (L), not mL! 500 mL = 0.5 L. Always convert before calculating.'},
        {type:'yellow',icon:'⚠️',text:'Concentration does NOT change if you add more solute AND more solvent in equal proportion.'},
        {type:'blue',icon:'🔬',text:'Seawater has a salt concentration of about 35 g/L. Drinking water < 0.3 g/L total minerals.'},
      ],
    },
    es:{
      title:'Concentración másica',subtitle:'C = m / V',
      vars:{a:{sym:'C',name:'Concentración',unit:'g/L'},b:{sym:'m',name:'Masa de soluto',unit:'g'},c:{sym:'V',name:'Volumen de solución',unit:'L'}},
      triangle:{top:'C',bl:'m',br:'V',hint:'Cubre el valor buscado'},
      targets:['C (concentración)','m (masa soluto)','V (volumen solución)'],
      formulas:['C = m ÷ V','m = C × V','V = m ÷ C'],
      examples:[
        {p:'Se disuelven 15 g de sal en 0,5 L de agua. ¿Cuál es la concentración?',s:'C = 15 ÷ 0,5 = 30 g/L'},
        {p:'¿Qué masa de azúcar se necesita para preparar 2 L de solución a 50 g/L?',s:'m = 50 × 2 = 100 g'},
        {p:'¿En qué volumen disolver 8 g para obtener C = 16 g/L?',s:'V = 8 ÷ 16 = 0,5 L'},
      ],
      tips:[
        {type:'green',icon:'💡',text:'Atención: V está en litros (L), ¡no en mL! 500 mL = 0,5 L. Siempre convertir antes de calcular.'},
        {type:'yellow',icon:'⚠️',text:'La concentración NO cambia si se agrega más soluto Y más solvente en proporción igual.'},
        {type:'blue',icon:'🔬',text:'El agua de mar tiene una concentración de sal de ~35 g/L. El agua potable < 0,3 g/L de minerales.'},
      ],
    },
    fields:[
      {key:'a',sym:'C',unit:'g/L',min:0.01,max:1000,step:0.01,default:''},
      {key:'b',sym:'m',unit:'g',min:0.01,max:10000,step:0.01,default:''},
      {key:'c',sym:'V',unit:'L',min:0.001,max:1000,step:0.001,default:''},
    ],
    solve:(a,b,c)=>{
      if(b!==null&&c!==null) return {key:'a',val:b/c,eq:`C = ${b} ÷ ${c} = ${fmt(b/c)} g/L`};
      if(a!==null&&c!==null) return {key:'b',val:a*c,eq:`m = ${a} × ${c} = ${fmt(a*c)} g`};
      if(a!==null&&b!==null) return {key:'c',val:b/a,eq:`V = ${b} ÷ ${a} = ${fmt(b/a)} L`};
      return null;
    },
  },
  {
    id:'dilution', cat:'chimie',
    icon:'💧', color:'#ff6b9d', btnColor:'linear-gradient(135deg,#880e4f,#c2185b)',
    fr:{
      title:'Dilution',subtitle:'C₁ × V₁ = C₂ × V₂',
      vars:{a:{sym:'C₁',name:'Concentration initiale',unit:'g/L'},b:{sym:'V₁',name:'Volume prélevé',unit:'L'},c:{sym:'C₂',name:'Concentration finale',unit:'g/L'},d:{sym:'V₂',name:'Volume final',unit:'L'}},
      triangle:{top:'C₁V₁',bl:'C₂',br:'V₂',hint:'La quantité de soluté est conservée'},
      targets:['C₁ (conc. initiale)','V₁ (vol. prélevé)','C₂ (conc. finale)','V₂ (vol. final)'],
      formulas:['C₁ × V₁ = C₂ × V₂','C₁ = C₂V₂ ÷ V₁','V₁ = C₂V₂ ÷ C₁','C₂ = C₁V₁ ÷ V₂','V₂ = C₁V₁ ÷ C₂'],

function fmt(n){
  if(isNaN(n)||!isFinite(n)) return '?';
  const r = Math.round(n*10000)/10000;
  return r % 1 === 0 ? r.toString() : r.toFixed(4).replace(/\.?0+$/,'');
}

function setLang(l){
  lang = l;
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  const tx = HERO_TEXT[l];
  document.getElementById('hero-tag').textContent = tx.tag;
  document.getElementById('hero-h1').innerHTML = tx.h1;
  document.getElementById('hero-p').textContent = tx.p;
  renderCatTabs();
  renderFormulas();
}

function renderCatTabs(){
  const wrap = document.getElementById('cat-tabs');
  wrap.innerHTML = Object.entries(CATS).map(([id, meta]) => `
    <button class="cat-tab${activeCat===id?' active':''}"
      style="${activeCat===id?`background:${meta.color};border-color:${meta.color};color:#07090f`:''}"
      onclick="setCat('${id}')">
      ${meta.icon} ${meta[lang]}
    </button>
  `).join('');
}

function setCat(id){
  activeCat = id;
  renderCatTabs();
  renderFormulas();
}

// ═══════════════════════════════════════════════════════
//  RENDER FORMULA CARDS
// ═══════════════════════════════════════════════════════
function renderFormulas(){
  const filtered = activeCat === 'all' ? FORMULAS : FORMULAS.filter(f => f.cat === activeCat);
  const grid = document.getElementById('formula-grid');
  grid.innerHTML = '';
  filtered.forEach(f => {
    grid.appendChild(buildCard(f));
  });
}

function buildCard(f){
  const d = f[lang];
  const isOpen = openCards.has(f.id);
  const card = document.createElement('div');
  card.className = 'formula-card';
  card.id = `card-${f.id}`;

  card.innerHTML = `
    <div class="fc-header" onclick="toggleCard('${f.id}')">
      <div class="fc-icon">${f.icon}</div>
      <div class="fc-title-wrap">
        <div class="fc-title" style="color:${f.color}">${d.title}</div>
        <div class="fc-subtitle">${d.subtitle}</div>
      </div>
      <div class="fc-expand${isOpen?' open':''}">⌄</div>
    </div>
    <div class="fc-body${isOpen?' open':''}">
      ${buildCardBody(f, d)}
    </div>
  `;
  return card;
}

function buildCardBody(f, d){
  const bt = BTN_TEXT[lang];
  const vals = fieldVals[f.id] || {};

  // formula display
  let html = `
    <div class="formula-display">
      <div class="formula-main">${d.subtitle}</div>
      <div class="formula-vars">
        ${Object.values(d.vars).map(v => `<span class="fv">${v.sym} = ${v.name} [${v.unit}]</span>`).join('')}
      </div>
    </div>
  `;

  // all rearranged formulas
  html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem">
    ${d.formulas.map(fm => `<div style="font-family:var(--mono);font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 12px;color:var(--yellow)">${fm}</div>`).join('')}
  </div>`;

  // calculator
  html += `<div id="calc-${f.id}">`;
  html += `<div class="calc-grid">`;
  f.fields.forEach(field => {
    const v = vals[field.key];
    html += `
      <div class="calc-field" id="field-${f.id}-${field.key}">
        <div class="cf-label">${field.sym} <span class="cf-unit">${field.unit}</span></div>
        <input class="cf-input" type="number" placeholder="?" step="${field.step}" min="${field.min}" max="${field.max}"
          id="input-${f.id}-${field.key}"
          value="${v !== undefined ? v : ''}"
          oninput="setField('${f.id}','${field.key}',this.value)"/>
        <div class="cf-solve-indicator">→ RÉSULTAT</div>
      </div>`;
  });
  html += `</div>`;

  // result box
  html += `<div class="result-box" id="result-${f.id}"></div>`;

  // buttons
  html += `<div class="calc-actions">
    <button class="btn-solve" style="background:${f.btnColor};color:#fff"
      onclick="solveFormula('${f.id}')">${bt.solve}</button>
    <button class="btn-clear-calc" onclick="clearFormula('${f.id}')">${bt.clear}</button>
  </div>`;

  html += `</div>`; // /calc

  // examples
  if(d.examples && d.examples.length){
    html += `<div class="examples-wrap">
      <div class="examples-title" style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.6rem">
        Exemples réels — clique pour voir la solution
      </div>`;
    d.examples.forEach((ex, i) => {
      const key = `${f.id}_${i}`;
      const shown = exShown[key];
      html += `
        <div class="example-item" onclick="toggleEx('${key}')">
          <div class="ex-problem">📝 ${ex.p}</div>
          <div class="ex-solution${shown?' show':''}" id="ex-${key}">✅ ${ex.s}</div>
          <div class="ex-hint" id="exhint-${key}">${shown?'Clic pour masquer':'Clic pour voir la solution'}</div>
        </div>`;
    });
    html += `</div>`;
  }

  // tips
  if(d.tips && d.tips.length){
    html += d.tips.map(tip => `
      <div class="tip-box tip-${tip.type}">
        <div class="tip-icon">${tip.icon}</div>
        <div>${tip.text}</div>
      </div>`).join('');
  }

  return html;
}

// ═══════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════
function toggleCard(id){
  if(openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  // re-render just this card
  const f = FORMULAS.find(x => x.id === id);
  const card = document.getElementById(`card-${id}`);
  if(!card || !f) return;
  const isOpen = openCards.has(id);
  card.querySelector('.fc-expand').classList.toggle('open', isOpen);
  const body = card.querySelector('.fc-body');
  if(isOpen){
    body.innerHTML = buildCardBody(f, f[lang]);
    body.classList.add('open');
  } else {
    body.classList.remove('open');
  }
}

function setField(fid, key, val){
  if(!fieldVals[fid]) fieldVals[fid] = {};
  fieldVals[fid][key] = val === '' ? null : parseFloat(val);
}

function solveFormula(fid){
  const f = FORMULAS.find(x => x.id === fid);
  if(!f) return;
  const vals = fieldVals[fid] || {};
  const args = f.fields.map(field => {
    const v = vals[field.key];
    return (v === undefined || v === null || isNaN(v)) ? null : v;
  });

  const result = f.solve(...args);
  const resultBox = document.getElementById(`result-${fid}`);

  // clear highlights
  f.fields.forEach(field => {
    const el = document.getElementById(`field-${fid}-${field.key}`);
    if(el) el.classList.remove('solving');
  });

  if(!result){
    resultBox.className = 'result-box show';
    resultBox.style.background = 'rgba(255,95,109,.08)';
    resultBox.style.borderColor = 'rgba(255,95,109,.3)';
    const needMore = {fr:'Entre au moins 2 valeurs connues pour calculer la 3e.',en:'Enter at least 2 known values to calculate the 3rd.',es:'Ingresa al menos 2 valores conocidos para calcular el 3ro.'};
    resultBox.innerHTML = `<div style="color:var(--red);font-family:var(--mono);font-size:13px">⚠ ${needMore[lang]}</div>`;
    return;
  }

  // set result in input
  const targetField = f.fields.find(fl => fl.key === result.key);
  const inputEl = document.getElementById(`input-${fid}-${result.key}`);
  const fieldEl = document.getElementById(`field-${fid}-${result.key}`);
  if(inputEl) { inputEl.value = fmt(result.val); inputEl.classList.add('result-field'); }
  if(fieldEl) fieldEl.classList.add('solving');

  resultBox.className = 'result-box show';
  resultBox.style.background = '';
  resultBox.style.borderColor = '';
  resultBox.innerHTML = `
    <div class="result-equation">= ${fmt(result.val)} ${targetField ? targetField.unit : ''}</div>
    <div class="result-check" style="font-family:var(--mono);font-size:12px;color:rgba(255,209,102,.7)">${result.eq}</div>`;
}

function clearFormula(fid){
  fieldVals[fid] = {};
  const f = FORMULAS.find(x => x.id === fid);
  if(!f) return;
  f.fields.forEach(field => {
    const inp = document.getElementById(`input-${fid}-${field.key}`);
    const el = document.getElementById(`field-${fid}-${field.key}`);
    if(inp){ inp.value = ''; inp.classList.remove('result-field'); }
    if(el) el.classList.remove('solving');
  });
  const rb = document.getElementById(`result-${fid}`);
  if(rb) rb.className = 'result-box';
}

function toggleEx(key){
  exShown[key] = !exShown[key];
  const sol = document.getElementById(`ex-${key}`);
  const hint = document.getElementById(`exhint-${key}`);
  if(sol) sol.classList.toggle('show', exShown[key]);
  const hintTexts = {
    fr:['Clic pour voir la solution','Clic pour masquer'],
    en:['Click to see solution','Click to hide'],
    es:['Clic para ver la solución','Clic para ocultar'],
  };
  if(hint) hint.textContent = hintTexts[lang][exShown[key]?1:0];
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
renderCatTabs();
renderFormulas();

// auto-open first card
setTimeout(()=>{ if(FORMULAS.length) toggleCard(FORMULAS[0].id); }, 200);
</script>

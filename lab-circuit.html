<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Circuits électriques · STE Sec 3</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--bg2:#0d1420;--bg3:#121d2e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#dce8f8;--muted:#4a6282;
  --yellow:#ffd166;--blue:#5bc8ff;--green:#4ddc8a;--red:#ff5f6d;--orange:#ff8c42;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:12px;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 15%  20%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 80%  15%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 75%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 90%  55%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 8%   70%,rgba(255,255,255,.2) 0%,transparent 100%);
  pointer-events:none;z-index:0}

/* ── LANG ── */
#lang-bar{position:relative;z-index:10;display:flex;gap:6px;justify-content:flex-end;padding:1rem 1.25rem 0}
.lang-btn{font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:5px 12px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.lang-btn.active{background:var(--yellow);color:var(--bg);border-color:var(--yellow)}

#app{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:1.25rem 1.25rem 4rem}

/* ── HERO ── */
.hero{text-align:center;padding:1.25rem 0 1.75rem}
.hero-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.6rem}
.hero h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;letter-spacing:-.03em;margin-bottom:.3rem}
.hero h1 em{font-style:normal;color:var(--yellow)}
.hero p{font-size:13px;color:var(--muted)}

.sec{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:.85rem}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── CIRCUIT TYPE TABS ── */
.tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab-btn{flex:1;min-width:120px;padding:10px 14px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);font-family:var(--font);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center}
.tab-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,209,102,.08)}

/* ── MAIN LAYOUT ── */
.lab-layout{display:grid;grid-template-columns:1fr 260px;gap:1.25rem;margin-bottom:1.25rem;align-items:start}
@media(max-width:580px){.lab-layout{grid-template-columns:1fr}}

/* ── CIRCUIT SVG ── */
.circuit-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;position:relative}
#circuit-svg{width:100%;display:block}

/* current animation */
.current-dot{animation:flowRight 1.5s linear infinite}
.current-dot-branch{animation:flowRight .9s linear infinite}
@keyframes flowRight{0%{opacity:0;transform:translateX(-8px)}30%{opacity:1}70%{opacity:1}100%{opacity:0;transform:translateX(8px)}}

/* ── SLIDERS PANEL ── */
.sliders-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;display:flex;flex-direction:column;gap:1rem}

.slider-group{display:flex;flex-direction:column;gap:.4rem}
.slider-label{display:flex;justify-content:space-between;align-items:baseline}
.slider-name{font-size:13px;font-weight:600}
.slider-val{font-family:var(--mono);font-size:13px;font-weight:700}

input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:7px;border-radius:4px;outline:none;cursor:pointer;background:var(--border2)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid var(--bg);transition:transform .1s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}

/* ── METERS ── */
.meters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem}
.meter{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.85rem .75rem;text-align:center}
.meter-val{font-family:var(--mono);font-size:1.5rem;font-weight:700;line-height:1;margin-bottom:3px;transition:color .3s}
.meter-unit{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px}
.meter-label{font-size:12px;color:var(--muted)}
.meter-formula{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}

/* component detail cards */
.comp-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
.comp-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.85rem}
.comp-title{font-size:12px;font-weight:600;margin-bottom:.35rem;display:flex;align-items:center;gap:6px}
.comp-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:2px 0}
.comp-row span:last-child{font-family:var(--mono);color:var(--text)}

/* ── INFO BOX ── */
.info-box{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:0 var(--r) var(--r) 0;padding:1rem 1.25rem;font-size:13px;line-height:1.75;color:rgba(220,232,248,.85);margin-bottom:1.25rem}
.info-box h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:.5rem}
.info-box .formula-block{background:var(--bg3);border-radius:8px;padding:.65rem 1rem;font-family:var(--mono);font-size:14px;color:var(--yellow);margin:.6rem 0;text-align:center;letter-spacing:.05em}

/* ── THEORY ── */
.theory-box{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:0 var(--r) var(--r) 0;padding:1rem 1.25rem;font-size:13px;line-height:1.8;color:rgba(220,232,248,.8);margin-bottom:1.25rem}
.theory-box h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:.5rem}

/* ── QUIZ ── */
.q-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}
.q-num{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:.4rem}
.q-text{font-size:14px;line-height:1.6;margin-bottom:.75rem}
.q-opts{display:grid;gap:6px}
.q-opt{display:block;width:100%;text-align:left;padding:9px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-size:13px;color:var(--text);cursor:pointer;transition:all .15s}
.q-opt:hover:not(:disabled){border-color:var(--border2);transform:translateX(3px)}
.q-opt:disabled{cursor:default}
.q-opt.correct{background:rgba(77,220,138,.12);border-color:var(--green);color:#a7f3ca}
.q-opt.wrong{background:rgba(255,95,109,.1);border-color:var(--red);color:#fca5a5}
.q-opt.reveal{background:rgba(77,220,138,.08);border-color:rgba(77,220,138,.4);color:#a7f3ca}
.q-fb{display:none;margin-top:.6rem;padding:.65rem .9rem;border-radius:7px;font-size:12.5px;line-height:1.65}
.q-fb.show{display:block;animation:fadeUp .2s ease}
.q-fb.ok{background:rgba(77,220,138,.08);color:#a7f3ca;border-left:3px solid var(--green)}
.q-fb.bad{background:rgba(255,95,109,.08);color:#fca5a5;border-left:3px solid var(--red)}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;text-align:center;display:none;margin-top:1rem}
.result-card.show{display:block;animation:fadeUp .4s ease}
.result-pct{font-size:3rem;font-weight:900;letter-spacing:-.04em;margin-bottom:.3rem}
.result-msg{font-size:13px;color:var(--muted);margin-bottom:1rem}
.btn-retry{font-family:var(--font);font-weight:700;font-size:14px;padding:11px 24px;border:none;border-radius:8px;background:var(--yellow);color:var(--bg);cursor:pointer;transition:all .2s}
.btn-retry:hover{transform:translateY(-2px)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="lang-bar">
  <button class="lang-btn active" onclick="setLang('fr')">FR</button>

  <!-- METERS -->
  <div class="meters" id="meters"></div>

  <!-- COMPONENT DETAIL CARDS -->
  <div class="comp-cards" id="comp-cards"></div>

  <!-- THEORY -->
  <p class="sec" id="sec-theory">Théorie</p>
  <div class="theory-box" id="theory-box"></div>

  <!-- QUIZ -->
  <p class="sec" id="sec-quiz">Quiz</p>
  <div id="quiz-body"></div>
  <div class="result-card" id="result-card">
    <div class="result-pct" id="result-pct"></div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn-retry" onclick="initQuiz()" id="btn-retry"></button>
  </div>
</div>

    theory:`<h3>Électricité — concepts fondamentaux</h3>
<strong>Tension (V)</strong> — Différence de potentiel électrique entre deux points. Unité : Volt (V).<br>

// ═══════════════════════════════════════════════════
//  CALCULATIONS
// ═══════════════════════════════════════════════════
function calc(){
  const {V, R1, R2} = vals;
  if(circuitType === 'serie'){
    const Rt = R1 + R2;
    const I  = V / Rt;
    const V1 = I * R1;
    const V2 = I * R2;
    const P  = V * I;
    return {Rt, I, I1:I, I2:I, V1, V2, P, P1:V1*I, P2:V2*I};
  } else if(circuitType === 'parallel'){
    const Rt = 1 / (1/R1 + 1/R2);
    const It = V / Rt;
    const I1 = V / R1;
    const I2 = V / R2;
    const P  = V * It;
    return {Rt, I:It, I1, I2, V1:V, V2:V, P, P1:V*I1, P2:V*I2};
  } else { // ohm
    const I = V / R1;
    const P = V * I;
    return {Rt:R1, I, I1:I, I2:0, V1:V, V2:0, P, P1:P, P2:0};
  }
}

function fmt(n){ return Math.round(n*100)/100; }

// ═══════════════════════════════════════════════════
//  SVG CIRCUIT DRAWING
// ═══════════════════════════════════════════════════
function svgEl(tag, attrs, text){
  const ns = 'http://www.w3.org/2000/svg';
  const el = document.createElementNS(ns, tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  if(text !== undefined) el.textContent = text;
  return el;
}

function renderCircuit(){
  const svg = document.getElementById('circuit-svg');
  svg.innerHTML = '';
  const c = calc();

  if(circuitType === 'serie') drawSerie(svg, c);
  else if(circuitType === 'parallel') drawParallel(svg, c);
  else drawOhm(svg, c);
}

// ─── Wire helper ───────────────────────────────────
function wire(svg, x1,y1,x2,y2, color='rgba(91,200,255,0.7)', w=2.5){
  svg.appendChild(svgEl('line',{x1,y1,x2,y2,stroke:color,'stroke-width':w,'stroke-linecap':'round'}));
}

// ─── Battery ───────────────────────────────────────
function battery(svg, x, y, V){
  const g = svgEl('g',{transform:`translate(${x},${y})`});
  // body
  g.appendChild(svgEl('rect',{x:-14,y:-22,width:28,height:44,rx:4,fill:'rgba(255,209,102,0.15)',stroke:'#ffd166','stroke-width':2}));
  // poles
  g.appendChild(svgEl('line',{x1:-8,y1:-22,x2:8,y2:-22,stroke:'#ff5252','stroke-width':3,'stroke-linecap':'round'})); // +
  g.appendChild(svgEl('line',{x1:-8,y1:22,x2:8,y2:22,stroke:'#607d8b','stroke-width':3,'stroke-linecap':'round'})); // -
  g.appendChild(svgEl('text',{x:0,y:5,fill:'#ffd166','font-size':13,'font-weight':'700','text-anchor':'middle','font-family':'JetBrains Mono'},`${V}V`));
  g.appendChild(svgEl('text',{x:0,y:-28,fill:'#ff5252','font-size':10,'text-anchor':'middle','font-family':'JetBrains Mono'},'+'));
  g.appendChild(svgEl('text',{x:0,y:34,fill:'#607d8b','font-size':10,'text-anchor':'middle','font-family':'JetBrains Mono'},'−'));
  svg.appendChild(g);
}

// ─── Resistor ──────────────────────────────────────
function resistor(svg, x, y, R, label, color, I, horiz=true){
  const g = svgEl('g',{transform:`translate(${x},${y})${horiz?'':' rotate(90)'}`});
  // zigzag resistor symbol
  const pts = '-26,0 -18,-10 -10,10 -2,-10 6,10 14,-10 22,10 26,0';
  g.appendChild(svgEl('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':2.5,'stroke-linecap':'round','stroke-linejoin':'round'}));
  // label
  g.appendChild(svgEl('text',{x:0,y:horiz?-16:16,fill:color,'font-size':11,'font-weight':'700','text-anchor':'middle','font-family':'JetBrains Mono'},`${label}=${R}Ω`));
  // current label
  if(I !== undefined){
    g.appendChild(svgEl('text',{x:0,y:horiz?22:-22,fill:'rgba(91,200,255,0.8)','font-size':10,'text-anchor':'middle','font-family':'JetBrains Mono'},`I=${fmt(I)}A`));
  }
  svg.appendChild(g);
}

// ─── Ammeter ───────────────────────────────────────
function ammeter(svg, x, y, I){
  const g = svgEl('g',{transform:`translate(${x},${y})`});
  g.appendChild(svgEl('circle',{cx:0,cy:0,r:14,fill:'rgba(91,200,255,0.12)',stroke:'#5bc8ff','stroke-width':2}));
  g.appendChild(svgEl('text',{x:0,y:5,fill:'#5bc8ff','font-size':11,'font-weight':'700','text-anchor':'middle','font-family':'JetBrains Mono'},'A'));
  g.appendChild(svgEl('text',{x:0,y:26,fill:'#5bc8ff','font-size':10,'text-anchor':'middle','font-family':'JetBrains Mono'},`${fmt(I)}A`));
  svg.appendChild(g);
}

// ─── Voltmeter ─────────────────────────────────────
function voltmeter(svg, x, y, V){
  const g = svgEl('g',{transform:`translate(${x},${y})`});
  g.appendChild(svgEl('circle',{cx:0,cy:0,r:14,fill:'rgba(255,209,102,0.12)',stroke:'#ffd166','stroke-width':2}));

  g.appendChild(svgEl('text',{x:0,y:26,fill:'#ffd166','font-size':10,'text-anchor':'middle','font-family':'JetBrains Mono'},`${fmt(V)}V`));

// ─── Bulb (for ohm mode) ───────────────────────────
function bulb(svg, x, y, P){
  const bright = Math.min(1, P/20);
  const g = svgEl('g',{transform:`translate(${x},${y})`});
  // glow
  if(bright > 0.1){
    g.appendChild(svgEl('circle',{cx:0,cy:0,r:28,fill:`rgba(255,209,102,${bright*0.2})`}));
  }
  g.appendChild(svgEl('circle',{cx:0,cy:0,r:16,fill:`rgba(255,209,102,${0.1+bright*0.3})`,stroke:'#ffd166','stroke-width':2}));
  g.appendChild(svgEl('text',{x:0,y:5,fill:'#ffd166','font-size':14,'text-anchor':'middle'},'💡'));
  g.appendChild(svgEl('text',{x:0,y:30,fill:'rgba(255,209,102,0.8)','font-size':10,'text-anchor':'middle','font-family':'JetBrains Mono'},`${fmt(P)}W`));
  svg.appendChild(g);
}

// ─── Current flow dots ─────────────────────────────
function flowDots(svg, x1,y1,x2,y2, I, count=3){
  if(I < 0.05) return;
  const speed = Math.max(0.5, 3 - I*0.3);
  for(let i=0;i<count;i++){
    const dot = svgEl('circle',{r:3,fill:'var(--blue)',opacity:'0.9'});
    const anim = document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
    anim.setAttribute('dur',`${speed}s`);
    anim.setAttribute('begin',`${i*(speed/count)}s`);
    anim.setAttribute('repeatCount','indefinite');
    const mp = document.createElementNS('http://www.w3.org/2000/svg','mpath');
    // create path
    const pathId = `fp-${Math.random().toString(36).slice(2)}`;
    const path = svgEl('path',{id:pathId,d:`M${x1},${y1} L${x2},${y2}`,fill:'none',stroke:'none'});
    svg.appendChild(path);
    mp.setAttribute('href','#'+pathId);
    anim.appendChild(mp);
    dot.appendChild(anim);
    svg.appendChild(dot);
  }
}

// ─── SERIE CIRCUIT ─────────────────────────────────
function drawSerie(svg, c){
  const wc = 'rgba(91,200,255,0.6)';
  // top wire
  wire(svg,60,60,340,60,wc);
  // right side
  wire(svg,340,60,340,240,wc);
  // bottom wire
  wire(svg,340,240,60,240,wc);
  // left side
  wire(svg,60,240,60,60,wc);

  // battery left
  battery(svg,60,150, vals.V);
  // R1 top
  resistor(svg,170,60, vals.R1,'R₁','#ff8c42', c.I1, true);
  // R2 right
  resistor(svg,340,150, vals.R2,'R₂','#ff5f6d', c.I2, false);
  // ammeter bottom
  ammeter(svg,200,240, c.I);
  // voltmeter R1
  voltmeter(svg,170,30, c.V1);

  // flow dots
  flowDots(svg,65,60,335,60, c.I);
  flowDots(svg,340,65,340,235, c.I);
  flowDots(svg,335,240,65,240, c.I);
  flowDots(svg,60,235,60,65, c.I);
}

// ─── PARALLEL CIRCUIT ──────────────────────────────
function drawParallel(svg, c){
  const wc = 'rgba(91,200,255,0.6)';
  // main rails
  wire(svg,40,40,360,40,wc,3);   // top rail
  wire(svg,40,260,360,260,wc,3); // bottom rail
  wire(svg,40,40,40,260,wc,2.5); // left rail
  wire(svg,360,40,360,260,wc,2.5); // right rail

  // branch 1 verticals
  wire(svg,160,40,160,260,wc,1.5);
  // branch 2 verticals
  wire(svg,270,40,270,260,wc,1.5);

  // battery
  battery(svg,40,150, vals.V);
  // R1 branch 1
  resistor(svg,160,150, vals.R1,'R₁','#ff8c42', c.I1, false);
  // R2 branch 2
  resistor(svg,270,150, vals.R2,'R₂','#ff5f6d', c.I2, false);
  // ammeter main
  ammeter(svg,360,150, c.I);

  // voltage labels (same everywhere)
  voltmeter(svg,215,150, vals.V);

  // flow dots branches
  flowDots(svg,160,45,160,145, c.I1, 2);
  flowDots(svg,160,155,160,255, c.I1, 2);
  flowDots(svg,270,45,270,145, c.I2, 2);
  flowDots(svg,270,155,270,255, c.I2, 2);
  flowDots(svg,45,40,155,40, c.I);
  flowDots(svg,275,40,355,40, c.I);
}

// ─── OHM MODE ──────────────────────────────────────
function drawOhm(svg, c){
  const wc = 'rgba(91,200,255,0.6)';
  wire(svg,60,80,340,80,wc);
  wire(svg,340,80,340,220,wc);
  wire(svg,340,220,60,220,wc);
  wire(svg,60,220,60,80,wc);

  battery(svg,60,150, vals.V);
  resistor(svg,200,80, vals.R1,'R','#ff8c42', c.I, true);
  bulb(svg,200,220, c.P);
  ammeter(svg,340,150, c.I);
  voltmeter(svg,200,150, vals.V);

  flowDots(svg,65,80,335,80, c.I);
  flowDots(svg,340,85,340,215, c.I);
  flowDots(svg,335,220,65,220, c.I);
  flowDots(svg,60,215,60,85, c.I);

  // formula display
  const fG = svgEl('g',{});
  fG.appendChild(svgEl('rect',{x:10,y:265,width:380,height:28,rx:6,fill:'rgba(255,209,102,0.07)',stroke:'rgba(255,209,102,0.2)','stroke-width':1}));
  fG.appendChild(svgEl('text',{x:200,y:283,fill:'#ffd166','font-size':12,'text-anchor':'middle','font-family':'JetBrains Mono'},
    `V=${fmt(vals.V)}V  R=${vals.R1}Ω  I=${fmt(c.I)}A  P=${fmt(c.P)}W`));
  svg.appendChild(fG);
}

// ═══════════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════════
function initQuiz(){
  quizAnswers = [];
  document.getElementById('result-card').className = 'result-card';
  const tx = TX[lang];
  document.getElementById('btn-retry').textContent = tx.btnRetry;
  document.getElementById('quiz-body').innerHTML = tx.questions.map((q,i) => `
    <div class="q-block" id="qb-${i}">
      <div class="q-num">⚡ Q${i+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts">
        ${q.opts.map((o,j) => `<button class="q-opt" id="qo-${i}-${j}" onclick="answerQ(${i},${j})">${o}</button>`).join('')}
      </div>
      <div class="q-fb" id="qfb-${i}"></div>
    </div>
  `).join('');
}

function answerQ(qi,oi){
  if(quizAnswers[qi] !== undefined) return;
  quizAnswers[qi] = oi;
  const tx = TX[lang];
  const q = tx.questions[qi];
  const ok = oi === q.ans;
  for(let j=0;j<q.opts.length;j++){
    const btn = document.getElementById(`qo-${qi}-${j}`);
    btn.disabled = true;
    if(j===q.ans) btn.classList.add(ok?'correct':'reveal');
    if(j===oi&&!ok) btn.classList.add('wrong');
  }
  const fb = document.getElementById(`qfb-${qi}`);
  fb.className = 'q-fb show '+(ok?'ok':'bad');
  fb.innerHTML = (ok?'✓ ':'✗ ')+q.exp;
  document.getElementById(`qb-${qi}`).style.borderColor = ok?'#4ddc8a':'#ff5f6d';
  if(quizAnswers.filter(a=>a!==undefined).length===tx.questions.length) setTimeout(showResults,500);
}

function showResults(){
  const tx = TX[lang];
  const correct = quizAnswers.filter((a,i)=>a===tx.questions[i].ans).length;
  const pct = Math.round((correct/tx.questions.length)*100);
  const v = tx.verdicts.find(x=>pct>=x.min);
  document.getElementById('result-pct').textContent = v.icon+' '+pct+'%';
  document.getElementById('result-msg').textContent = v.msg;
  document.getElementById('result-card').className = 'result-card show';
  document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'center'});
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
applyTexts();
renderAll();
initQuiz();
</script>
